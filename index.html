    cbOk.textContent = '削除';
    cbOk.style.background = '#DC2626';
    onSingleClick = null;
    onOkClick = function(){
      const ev=(events[selectedDate]||[]).find(x=>x.id===eventId);
      if(ev){const ep=getEventPhotos(ev);for(let pi=0;pi<ep.length;pi++) deletePhoto(ep[pi]);}
      deleteEvent(selectedDate, eventId); saveEvents();
      refreshDetailPanel(); renderAllMonths();
    };
    confirmDialog.classList.remove('hidden');
  }

  function showDeleteGroupConfirm(eventId, groupId) {
    document.getElementById('confirm-title').textContent = '繰り返し予定の削除';
    document.getElementById('confirm-message').textContent = '削除する範囲を選択してください。';
    cbSingle.style.display = '';
    cbSingle.textContent = 'この日のみ';
    cbOk.textContent = 'すべて削除';
    cbOk.style.background = '#DC2626';
    onSingleClick = function(){
      const ev=(events[selectedDate]||[]).find(x=>x.id===eventId);
      if(ev){const ep=getEventPhotos(ev);for(let pi=0;pi<ep.length;pi++) deletePhoto(ep[pi]);}
      deleteEvent(selectedDate, eventId); saveEvents();
      refreshDetailPanel(); renderAllMonths();
    };
    onOkClick = function(){
      const keys=Object.keys(events);
      for(let i=0;i<keys.length;i++){if(events[keys[i]]){for(let j=0;j<events[keys[i]].length;j++){const ev=events[keys[i]][j];if(ev.groupId===groupId){const ep=getEventPhotos(ev);for(let pi=0;pi<ep.length;pi++) deletePhoto(ep[pi]);}}}}
      deleteEventsByGroupId(groupId); saveEvents();
      refreshDetailPanel(); renderAllMonths();
    };
    confirmDialog.classList.remove('hidden');
  }

  function showEditGroupConfirm(updates, newDate, restoreBtn) {
    document.getElementById('confirm-title').textContent = '繰り返し予定の編集';
    document.getElementById('confirm-message').textContent = '変更する範囲を選択してください。';
    cbSingle.style.display = '';
    cbSingle.textContent = 'この予定のみ';
    cbOk.textContent = 'すべて変更';
    cbOk.style.background = '#2563EB';
    onSingleClick = function(){
      try{
        if(newDate&&newDate!==selectedDate){
          moveEvent(selectedDate,newDate,editingEvent.id);
          updateEvent(newDate,editingEvent.id,updates);
        } else {
          updateEvent(selectedDate,editingEvent.id,updates);
        }
        saveEvents();
      }catch(e){ alert('編集エラー: '+e.message); }
      if(restoreBtn)restoreBtn(); closeModal();
      if(newDate&&newDate!==selectedDate){selectedDate=newDate;}
      renderDetailPanel(selectedDate); renderAllMonths();
    };
    onOkClick = function(){
      try{
        const gid=editingEvent.groupId;
        const keys=Object.keys(events);
        for(let i=0;i<keys.length;i++){
          if(events[keys[i]]){
            for(let j=0;j<events[keys[i]].length;j++){
              if(events[keys[i]][j].groupId===gid){
                const oldP=getEventPhotos(events[keys[i]][j]);
                const newP=updates.photos||[];
                for(let pi=0;pi<oldP.length;pi++){if(newP.indexOf(oldP[pi])===-1) deletePhoto(oldP[pi]);}
                Object.assign(events[keys[i]][j],updates);
              }
            }
          }
        }
        saveEvents();
      }catch(e){ alert('編集エラー: '+e.message); }
      if(restoreBtn)restoreBtn(); closeModal();
      renderDetailPanel(selectedDate); renderAllMonths();
    };
    confirmDialog.classList.remove('hidden');
  }

  // ===== 設定モーダル =====
  (function(){
    var settingsModal=document.getElementById('settings-modal');
    var tabs=settingsModal.querySelectorAll('.settings-tab');
    var panes=settingsModal.querySelectorAll('.settings-tab-pane');
    tabs.forEach(function(tab){
      tab.addEventListener('click',function(){
        tabs.forEach(function(t){t.classList.remove('active');});
        panes.forEach(function(p){p.classList.remove('active');});
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab).classList.add('active');
      });
    });
    document.getElementById('btn-open-settings').addEventListener('click',function(){
      // 同期タブのuserId復元
      var c=loadSyncConfig();
      if(c){document.getElementById('fb-userId').value=c.userId||'';}
      else{try{var s=JSON.parse(localStorage.getItem(SYNC_CONFIG_KEY))||{};document.getElementById('fb-userId').value=s.userId||'';}catch(e){}}
      // 容量表示を設定内に更新
      var sizeEl=document.getElementById('doc-size-in-settings');
      if(sizeEl){
        if(!firebaseDb){sizeEl.textContent='';}
        else{var kb=estimateDocSizeKB();sizeEl.textContent='データ容量: '+(kb>=1024?(kb/1024).toFixed(1)+'MB':Math.round(kb)+'KB')+' / 1MB';sizeEl.style.color=kb>=900?'#DC2626':kb>=700?'#F59E0B':'#6B7280';}
      }
      settingsModal.classList.remove('hidden');
    });
    document.getElementById('btn-close-settings').addEventListener('click',function(){settingsModal.classList.add('hidden');});
    settingsModal.addEventListener('click',function(e){if(e.target===settingsModal)settingsModal.classList.add('hidden');});

    // 表示設定
    var DISPLAY_KEY=STORAGE_KEY+'_display_settings';
    function loadDisplaySettings(){
      try{return JSON.parse(localStorage.getItem(DISPLAY_KEY))||{};}catch(e){return {};}
    }
    function saveDisplaySettings(s){localStorage.setItem(DISPLAY_KEY,JSON.stringify(s));}
    var ds=loadDisplaySettings();
    var chkWidget=document.getElementById('chk-show-widget');
    var chkInc=document.getElementById('chk-show-incomplete');
    chkWidget.checked=ds.showWidget!==false;
    chkInc.checked=ds.showIncomplete!==false;
    function applyDisplaySettings(){
      var w=document.getElementById('today-widget');
      var inc=document.querySelector('.incomplete-section');
      if(w) w.style.display=chkWidget.checked?'':'none';
      if(inc) inc.style.display=chkInc.checked?'':'none';
    }
    applyDisplaySettings();
    chkWidget.addEventListener('change',function(){
      var s=loadDisplaySettings();s.showWidget=chkWidget.checked;saveDisplaySettings(s);applyDisplaySettings();
    });
    chkInc.addEventListener('change',function(){
      var s=loadDisplaySettings();s.showIncomplete=chkInc.checked;saveDisplaySettings(s);applyDisplaySettings();
    });
    // renderAllMonths後にも適用
    window.__applyDisplaySettings=applyDisplaySettings;
  })();
  document.getElementById('btn-save-sync').addEventListener('click',()=>{
    const userId=document.getElementById('fb-userId').value.trim();
    if(!userId){alert('ユーザーIDを入力してください。');return;}
    const site={userId};
    localStorage.setItem(SYNC_CONFIG_KEY,JSON.stringify(site));
    saveUserIdCookie(userId);
    initFirebase();
  });
  // 共有リンク生成
  document.getElementById('btn-gen-share-link').addEventListener('click',()=>{
    const userId=document.getElementById('fb-userId').value.trim();
    if(!userId){alert('ユーザーIDを入力してください。');return;}
    const data=btoa(unescape(encodeURIComponent(JSON.stringify({...EMBEDDED_FIREBASE_CONFIG,userId}))));
    const url=window.location.origin+window.location.pathname+'?sync='+data;
    document.getElementById('share-link-url').value=url;
    document.getElementById('share-link-output').style.display='block';
  });
  document.getElementById('btn-copy-share-link').addEventListener('click',()=>{
    const input=document.getElementById('share-link-url');
    input.select();document.execCommand('copy');
    alert('コピーしました');
  });
  document.getElementById('btn-disconnect-sync').addEventListener('click',()=>{if(firebaseUnsubscribe){firebaseUnsubscribe();firebaseUnsubscribe=null;}firebaseDb=null;firebaseStorage=null;initialLoadDone=false;localStorage.removeItem(SYNC_CONFIG_KEY);updateSyncStatus('','切断しました');updateDocSizeDisplay();updatePhotoCount();});
  document.getElementById('btn-export').addEventListener('click',()=>{const blob=new Blob([JSON.stringify(events,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`calendar-backup-${dateToKey(new Date())}.json`;a.click();URL.revokeObjectURL(url);});
  document.getElementById('btn-import').addEventListener('click',()=>document.getElementById('import-file').click());
  document.getElementById('import-file').addEventListener('change',(e)=>{
    const file=e.target.files[0];if(!file)return;const reader=new FileReader();
    reader.onload=(ev)=>{try{const imported=JSON.parse(ev.target.result);for(const[dk,evList]of Object.entries(imported)){if(!events[dk])events[dk]=[];const ids=new Set(events[dk].map(e=>e.id));for(const ev of evList){if(!ids.has(ev.id))events[dk].push(ev);}}saveEvents();renderAllMonths();if(selectedDate)renderDetailPanel(selectedDate);alert('インポートが完了しました。');}catch{alert('ファイルの読み込みに失敗しました。');}};
    reader.readAsText(file);e.target.value='';
  });

  // 背景クリック
  confirmDialog.addEventListener('click',(e)=>{if(e.target===confirmDialog){ hideConfirm(); const sb=document.querySelector('#event-form button[type="submit"]'); if(sb){sb.disabled=false;sb.textContent='保存';} }});
  document.getElementById('event-modal').addEventListener('click',(e)=>{if(e.target===e.currentTarget)closeModal();});

  // ===== 初期化 =====
  loadEvents();
  cleanupOldEvents();
  // 旧データ(プレフィックスなし calendar_events)の重複削除
  // ※本部サイト(STORAGE_KEY==='calendar_events')では実行しない
  (function(){
    if(STORAGE_KEY==='calendar_events') return; // 本部は対象外
    const oldData=localStorage.getItem('calendar_events');
    if(!oldData) return;
    const siteData=localStorage.getItem(STORAGE_KEY);
    if(siteData && siteData===oldData){
      localStorage.removeItem('calendar_events');
      localStorage.removeItem('calendar_last_modified');
      localStorage.removeItem('calendar_last_cleanup');
    } else if(siteData) {
      // 異なるデータ: マージして旧データ削除
      try{
        const oldEvents=JSON.parse(oldData);
        const curEvents=JSON.parse(siteData);
        let merged=false;
        for(const dk of Object.keys(oldEvents)){
          if(!curEvents[dk]){curEvents[dk]=oldEvents[dk];merged=true;}
          else{const ids=new Set(curEvents[dk].map(e=>e.id));for(const ev of oldEvents[dk]){if(!ids.has(ev.id)){curEvents[dk].push(ev);merged=true;}}}
        }
        if(merged){events=curEvents;localStorage.setItem(STORAGE_KEY,JSON.stringify(events));}
        localStorage.removeItem('calendar_events');
        localStorage.removeItem('calendar_last_modified');
        localStorage.removeItem('calendar_last_cleanup');
      }catch(e){console.warn('旧データマージ失敗:',e);}
    }
  })();
  autoExtendRecurringEvents();
  deduplicateEvents();
  // Firestore接続前はlocalStorageのみ保存（pendingSyncをセットしない）
  localStorage.setItem(STORAGE_KEY,JSON.stringify(events));
  baseMonth=new Date();
  renderAllMonths();
  renderTodayWidget();
  // URLから同期設定を自動適用
  (function(){
    try{
      var params=new URLSearchParams(window.location.search);
      var syncData=params.get('sync');
      if(syncData){
        var cfg=JSON.parse(decodeURIComponent(escape(atob(syncData))));
        if(cfg.apiKey&&cfg.projectId&&cfg.userId){
          var site={userId:cfg.userId};
          localStorage.setItem(SYNC_CONFIG_KEY,JSON.stringify(site));
          saveUserIdCookie(cfg.userId);
          // URLパラメータを消す（再読み込み時に再適用されないように）
          window.history.replaceState({},'',window.location.pathname);
        }
      }
    }catch(e){console.warn('URL同期パラメータ読み取り失敗:',e);}
  })();
  initFirebase();


  // バックグラウンド復帰時にページをリロード（コード・データ両方最新化）
  let lastHiddenTime=0;
  document.addEventListener('visibilitychange',()=>{
    if(document.visibilityState==='hidden'){ lastHiddenTime=Date.now(); }
    if(document.visibilityState==='visible'&&lastHiddenTime>0){
      const elapsed=Date.now()-lastHiddenTime;
      if(elapsed>30000){ window.location.reload(); }
    }
  });

  // ===== ウィジェット内タグ管理 =====
  var TAG_STORAGE_KEY=SITE_PREFIX+'calendar_tags';
  function getTagList(){
    try{var s=localStorage.getItem(TAG_STORAGE_KEY);return s?JSON.parse(s):['薬準備','欠食'];}catch(e){return['薬準備','欠食'];}
  }
  function saveTagList(list){localStorage.setItem(TAG_STORAGE_KEY,JSON.stringify(list));}
  function renderTagOptions(){
    var c=document.getElementById('tag-options-container');if(!c)return;
    var tags=getTagList();
    c.innerHTML='';
    for(var i=0;i<tags.length;i++){
      var lbl=document.createElement('label');lbl.className='tag-label';
      var cb=document.createElement('input');cb.type='checkbox';cb.name='event-tag';cb.value=tags[i];
      lbl.appendChild(cb);lbl.appendChild(document.createTextNode(' '+tags[i]));
      cb.addEventListener('change',function(){this.closest('.tag-label').classList.toggle('checked',this.checked);});
      c.appendChild(lbl);
    }
  }
  function getSelectedTags(){
    var vals=[];
    document.querySelectorAll('#tag-options-container input[name="event-tag"]:checked').forEach(function(cb){vals.push(cb.value);});
    return vals;
  }
  function setTagCheckboxes(arr){
    document.querySelectorAll('#tag-options-container input[name="event-tag"]').forEach(function(cb){
      cb.checked=(arr||[]).indexOf(cb.value)!==-1;
      cb.closest('.tag-label').classList.toggle('checked',cb.checked);
    });
  }
  renderTagOptions();
  // openAddModal / openEditModal にタグ連動
  var _origOpenAdd=openAddModal;
  openAddModal=function(){ _origOpenAdd(); renderTagOptions(); setTagCheckboxes([]); };
  var _origOpenEdit=openEditModal;
  openEditModal=function(ev){ _origOpenEdit(ev); renderTagOptions(); setTagCheckboxes(ev.tags||[]); };

  // タグ設定（設定モーダル内タブ）
  (function(){
    var btnAdd=document.getElementById('btn-add-tag');
    var input=document.getElementById('new-tag-name');
    var listEl=document.getElementById('tag-setting-list');
    window.__renderTagSettingList=function renderList(){
      var tags=getTagList();listEl.innerHTML='';
      for(var i=0;i<tags.length;i++){
        var div=document.createElement('div');div.className='tag-setting-item';
        var span=document.createElement('span');span.textContent=tags[i];
        var btn=document.createElement('button');btn.className='tag-delete-btn';btn.textContent='✕';btn.dataset.idx=i;
        btn.addEventListener('click',function(){
          var t=getTagList();t.splice(parseInt(this.dataset.idx),1);saveTagList(t);renderList();renderTagOptions();
        });
        div.appendChild(span);div.appendChild(btn);listEl.appendChild(div);
      }
    };
    // タグタブ選択時にリスト更新
    var tabBtn=document.querySelector('.settings-tab[data-tab="tab-tag"]');
    if(tabBtn) tabBtn.addEventListener('click',function(){window.__renderTagSettingList();});
    btnAdd.addEventListener('click',function(){
      var name=input.value.trim();if(!name)return;
      var tags=getTagList();
      if(tags.indexOf(name)!==-1){alert('同じタグが既に存在します。');return;}
      tags.push(name);saveTagList(tags);input.value='';window.__renderTagSettingList();renderTagOptions();
    });
  })();

  // ===== 当日予定ウィジェット =====
  function renderTodayWidget(){
    var w=document.getElementById('today-widget');
    var d=new Date();
    var dk=todayKey;
    var dayEvs=getEventsForDate(dk);
    var dateStr=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+WEEKDAYS[d.getDay()]+'曜日';
    var colorMap=['var(--color0)','var(--color1)','var(--color2)','var(--color3)'];
    var html='<div class="widget-header">'
      +'<div class="widget-header-title">🌿 本日の予定</div>'
      +'<div class="widget-date">'+dateStr+'</div>'
      +'</div>';
    html+='<div class="widget-events">';
    if(dayEvs.length===0){
      html+='<div class="widget-empty">今日の予定はありません</div>';
    } else {
      for(var i=0;i<dayEvs.length;i++){
        var ev=dayEvs[i];
        var timeStr=ev.time||'--:--';
        var isImportant=ev.colorIndex===3;
        var isDone=!!ev.done;
        var rowCls='widget-event-row';
        if(isImportant&&!isDone) rowCls+=' important';
        if(isDone) rowCls+=' widget-done';
        var detailHtml=ev.detail?'<div class="widget-event-detail">'+escapeHtml(ev.detail)+'</div>':'';
        var tagsHtml='';
        if(ev.tags&&ev.tags.length>0){for(var t=0;t<ev.tags.length;t++){tagsHtml+='<span class="widget-tag">'+escapeHtml(ev.tags[t])+'</span>';}}
        var photosHtml='';
        var evPhotos=getEventPhotos(ev);
        if(evPhotos.length>0){
          photosHtml='<span class="widget-photos" data-photos="'+evPhotos.map(function(u){return encodeURIComponent(u);}).join(',')+'">';
          photosHtml+='<span class="widget-photo-icon" data-action="show-photo">📎'+( evPhotos.length>1?' '+evPhotos.length:'')+'</span>';
          photosHtml+='</span>';
        }
        html+='<div class="'+rowCls+'" data-widget-date="'+dk+'" data-widget-id="'+ev.id+'" style="cursor:pointer">'
          +'<span class="widget-time-text">'+timeStr+'</span> '
          +'<div class="widget-event-content">'
          +'<div class="widget-event-title">'+escapeHtml(ev.title||'（無題）')+photosHtml+'</div>'
          +tagsHtml
          +detailHtml
          +'</div>'
          +'</div>';
      }
    }
    html+='</div>';
    w.innerHTML=html;
    // ウィジェット写真アイコンクリック → ライトボックス表示（行クリックを阻止）
    w.querySelectorAll('.widget-photo-icon[data-action="show-photo"]').forEach(function(icon){
      icon.addEventListener('click',function(e){
        e.stopPropagation();
        var wrap=this.closest('.widget-photos');
        var raw=wrap?wrap.dataset.photos:'';
        var photos=raw?raw.split(',').map(function(u){return decodeURIComponent(u);}):[];
        if(photos.length>0 && window.__openLightbox) window.__openLightbox(photos[0], photos);
      });
    });
    // ウィジェット行クリック → 詳細パネル表示
    w.querySelectorAll('.widget-event-row[data-widget-date]').forEach(function(row){
      row.addEventListener('click',function(){
        var dk=this.dataset.widgetDate;
        if(dk){selectedDate=dk;incompleteMode=false;renderDetailPanel(dk);
          var dp=document.getElementById('detail-panel');if(dp)dp.classList.remove('hidden');
        }
      });
    });
  }

  // iPadのbfcache復帰時にボタン状態をリセット
  window.addEventListener('pageshow',function(e){
    if(e.persisted){
      const sb=document.querySelector('#event-form button[type="submit"]');
      if(sb){sb.disabled=false;sb.textContent='保存';}
    }
  });
})();
</script>

<script>
// ===== Site management code (runs after main IIFE) =====
(function() {
  'use strict';

  var utils = window.__siteUtils;
  var DEFAULT_SITE = utils.DEFAULT_SITE;
  var getSiteList = utils.getSiteList;
  var saveSiteList = utils.saveSiteList;
  var getCurrentSite = utils.getCurrentSite;

  var currentSite = getCurrentSite();
  var siteSelect = document.getElementById('site-select');
  var btnAddSite = document.getElementById('btn-add-site');
  var newSiteInput = document.getElementById('new-site-name');
  var siteListEl = document.getElementById('site-list');

  // Populate site selector dropdown
  function populateSiteSelect() {
    var sites = getSiteList();
    siteSelect.innerHTML = '';
    for (var i = 0; i < sites.length; i++) {
      var opt = document.createElement('option');
      opt.value = sites[i];
      opt.textContent = sites[i];
      // Select the current site
      if (currentSite === sites[i] || (!currentSite && sites[i] === DEFAULT_SITE)) {
        opt.selected = true;
      }
      siteSelect.appendChild(opt);
    }
  }

  // Handle site switching
  siteSelect.addEventListener('change', function() {
    var selected = siteSelect.value;
    if (selected === DEFAULT_SITE) {
      // Default site: no URL param, preserves original storage keys
      window.location.href = window.location.pathname;
    } else {
      window.location.href = window.location.pathname + '?site=' + encodeURIComponent(selected);
    }
  });

  // カレンダータブ選択時にリスト更新
  var siteTabBtn = document.querySelector('.settings-tab[data-tab="tab-site"]');
  if (siteTabBtn) siteTabBtn.addEventListener('click', function() { renderSiteList(); });

  // Get storage key prefix for a site name
  function getSitePrefix(siteName) {
    if (!siteName || siteName === DEFAULT_SITE) return '';
    return 'site_' + siteName + '_';
  }

  // Copy all calendar data from one site prefix to another (keeps originals intact)
  // sync_configはコピーしない（異なる拠点のFirestoreデータと混ざるのを防止）
  function copySiteData(oldSiteName, newSiteName) {
    var oldPrefix = getSitePrefix(oldSiteName);
    var newPrefix = getSitePrefix(newSiteName);
    var suffixes = ['calendar_events', 'calendar_last_modified', 'calendar_last_cleanup'];
    for (var i = 0; i < suffixes.length; i++) {
      var oldKey = oldPrefix + suffixes[i];
      var newKey = newPrefix + suffixes[i];
      var data = localStorage.getItem(oldKey);
      if (data !== null) {
        localStorage.setItem(newKey, data);
      }
    }
  }

  // Render site list in management modal
  function renderSiteList() {
    var sites = getSiteList();
    siteListEl.innerHTML = '';
    for (var i = 0; i < sites.length; i++) {
      var item = document.createElement('div');
      item.className = 'site-item';
      var nameSpan = document.createElement('span');
      nameSpan.className = 'site-item-name';
      nameSpan.textContent = sites[i];
      if (sites[i] === DEFAULT_SITE) {
        var defLabel = document.createElement('span');
        defLabel.className = 'site-item-default';
        defLabel.textContent = '（デフォルト）';
        nameSpan.appendChild(defLabel);
      }
      item.appendChild(nameSpan);
      var actionsDiv = document.createElement('div');
      actionsDiv.className = 'site-item-actions';
      // Rename button (all sites including default)
      var renameBtn = document.createElement('button');
      renameBtn.className = 'site-rename-btn';
      renameBtn.textContent = '名前変更';
      renameBtn.dataset.site = sites[i];
      renameBtn.addEventListener('click', function() {
        var oldName = this.dataset.site;
        var newName = prompt('新しい拠点名を入力してください：', oldName);
        if (!newName || !(newName = newName.trim()) || newName === oldName) return;
        var list = getSiteList();
        for (var j = 0; j < list.length; j++) {
          if (list[j] === newName) { alert('同じ名前の拠点が既に存在します。'); return; }
        }
        // Check if the new name has existing old data in localStorage
        var newPrefix = getSitePrefix(newName);
        var existingData = localStorage.getItem(newPrefix + 'calendar_events');
        var existingSyncConfig = localStorage.getItem(newPrefix + 'calendar_sync_config');
        if (existingSyncConfig) {
          // 変更先の拠点に同期設定がある → 他デバイスとデータ共有中の可能性
          var proceed = confirm('「' + newName + '」には同期設定があります。\n他のデバイスとデータを共有中の可能性があります。\n\n名前変更すると、リロード後にFirestoreのデータが読み込まれます。\n続行しますか？');
          if (!proceed) return;
          // 同期設定がある場合、ローカルのイベントデータはコピーしない
          // （Firestoreから正しいデータを取得するため）
        } else if (existingData && existingData !== '{}') {
          var useOld = confirm('「' + newName + '」の以前のデータが見つかりました。\n\n[OK] → 以前のデータを復元する\n[キャンセル] → 現在のデータで上書きする');
          if (!useOld) {
            copySiteData(oldName, newName);
          }
        } else {
          // No existing data: copy current data to new prefix
          copySiteData(oldName, newName);
        }
        // pendingSyncをクリア（旧データでFirestoreを上書きしないように）
        // 旧拠点・新拠点の両方をクリア
        var oldSyncPrefix = getSitePrefix(oldName);
        var newSyncPrefix = getSitePrefix(newName);
        localStorage.removeItem(oldSyncPrefix + 'pendingSync');
        localStorage.removeItem(newSyncPrefix + 'pendingSync');
        localStorage.removeItem('pendingSync'); // プレフィックスなしの旧形式もクリア
        // Schedule old data for cleanup after 30 days
        utils.recordRenamedSite(oldName);
        // Update site list
        for (var j = 0; j < list.length; j++) {
          if (list[j] === oldName) { list[j] = newName; break; }
        }
        saveSiteList(list);
        // Update default site reference if needed
        if (oldName === DEFAULT_SITE) {
          utils.DEFAULT_SITE = newName;
          DEFAULT_SITE = newName;
        }
        // Update last remembered site if it was the renamed one
        var lastSite = localStorage.getItem(utils.LAST_SITE_KEY);
        if (lastSite === oldName) {
          localStorage.setItem(utils.LAST_SITE_KEY, newName);
        }
        renderSiteList();
        populateSiteSelect();
        // If currently viewing the renamed site, navigate to new name
        if (currentSite === oldName || (!currentSite && oldName === DEFAULT_SITE)) {
          utils.rememberSite(newName);
          if (newName === DEFAULT_SITE) {
            window.location.href = window.location.pathname;
          } else {
            window.location.href = window.location.pathname + '?site=' + encodeURIComponent(newName);
          }
        }
      });
      actionsDiv.appendChild(renameBtn);
      // Delete button (not for default site)
      if (sites[i] !== DEFAULT_SITE) {
        var delBtn = document.createElement('button');
        delBtn.className = 'site-delete-btn';
        delBtn.textContent = '削除';
        delBtn.dataset.site = sites[i];
        delBtn.addEventListener('click', function() {
          var siteName = this.dataset.site;
          if (confirm('拠点「' + siteName + '」を削除しますか？\n\n※データはlocalStorageに残りますが、拠点一覧からは削除されます。')) {
            var list = getSiteList();
            list = list.filter(function(s) { return s !== siteName; });
            saveSiteList(list);
            // Clear last_modified so Firebase data wins when site is recreated
            var delPrefix = getSitePrefix(siteName);
            localStorage.removeItem(delPrefix + 'calendar_last_modified');
            renderSiteList();
            populateSiteSelect();
            // If currently viewing the deleted site, navigate to default
            if (currentSite === siteName) {
              window.location.href = window.location.pathname;
            }
          }
        });
        actionsDiv.appendChild(delBtn);
      }
      item.appendChild(actionsDiv);
      siteListEl.appendChild(item);
    }
  }

  // Add new site
  btnAddSite.addEventListener('click', function() {
    var name = newSiteInput.value.trim();
    if (!name) {
      alert('拠点名を入力してください。');
      return;
    }
    var sites = getSiteList();
    for (var i = 0; i < sites.length; i++) {
      if (sites[i] === name) {
        alert('同じ名前の拠点が既に存在します。');
        return;
      }
    }
    sites.push(name);
    saveSiteList(sites);
    newSiteInput.value = '';
    renderSiteList();
    populateSiteSelect();
  });

  // Allow Enter key to add site
  newSiteInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      btnAddSite.click();
    }
  });

  // Ensure current site exists in the site list
  if (currentSite && currentSite !== DEFAULT_SITE) {
    var sites = getSiteList();
    var found = false;
    for (var i = 0; i < sites.length; i++) {
      if (sites[i] === currentSite) { found = true; break; }
    }
    if (!found) {
      sites.push(currentSite);
      saveSiteList(sites);
    }
  }

  // Initialize
  populateSiteSelect();
})();
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js');}
</script>
