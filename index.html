<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="夢花カレンダー">
<meta name="theme-color" content="#81C784">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon-precomposed" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>夢花カレンダー</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color0: #6BAF7A;
  --color1: #E74C3C;
  --color2: #E67E22;
  --color0-bg: #EAF5EC;
  --color1-bg: #FDE8E8;
  --color2-bg: #FFF3E0;
  --color3: #DC2626;
  --color3-bg: #FEE2E2;
  --sunday: #E53E3E;
  --saturday: #4A9E6B;
  --holiday: #E53E3E;
  --today-border: #81C784;
  --today-bg: #F1F8E9;
  --bg: #FDF8F5;
  --card-bg: #FFFFFF;
  --text: #1F2937;
  --text-light: #6B7280;
  --border: #F0DDD5;
  --radius: 8px;
  --accent: #6BAF7A;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
}

#app-header {
  position: sticky; top: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 10px; background: linear-gradient(135deg, #F5FAF5 0%, #EFF8EF 50%, #F0F8F0 100%);
  border-bottom: 1px solid #B8D8B8;
  box-shadow: 0 1px 6px rgba(107,175,122,0.1);
  gap: 6px; flex-wrap: nowrap;
}
.header-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }
.header-btn {
  padding: 5px 8px; border: 1px solid #B8D8B8;
  border-radius: var(--radius); background: rgba(255,255,255,0.8);
  cursor: pointer; font-size: 0.82rem; transition: all 0.15s;
  color: #3E6B4A;
}
.header-btn:hover { background: #E8F5E9; border-color: #81C784; }

#main-layout { display: flex; max-width: 100%; margin: 0 auto; }
#main-left { flex: 1; min-width: 0; }
#calendar-container { padding: 8px; }
.month-grid-wrap { overflow-x: auto; }

#detail-panel {
  width: 400px; min-width: 400px; background: white;
  border-left: 1px solid var(--border);
  box-shadow: -2px 0 10px rgba(0,0,0,0.05);
  display: flex; flex-direction: column;
  position: sticky; top: 44px; height: calc(100vh - 44px);
}
#detail-panel.hidden { width: 0; min-width: 0; overflow: hidden; border-left: none; box-shadow: none; }

.panel-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  min-width: 400px; background: linear-gradient(135deg, #F5FAF5, #EFF8EF);
}
.panel-header h2 { font-size: 1.1rem; white-space: nowrap; }
.panel-body { flex: 1; overflow-y: auto; min-width: 400px; min-height: 0; }
#detail-events-list { padding: 16px 20px; }
.panel-footer { padding: 12px 20px 16px; min-width: 400px; border-top: 1px solid var(--border); flex-shrink: 0; }

.month-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 8px 8px; }
.month-header h2 { font-size: 1.3rem; font-weight: 700; }
.month-nav { display: flex; gap: 4px; }
.month-nav button {
  padding: 5px 12px; border: 1px solid var(--border);
  border-radius: var(--radius); background: white; cursor: pointer;
  font-size: 0.82rem; font-weight: 600; display: flex; align-items: center; justify-content: center;
  white-space: nowrap; color: var(--text);
}
.month-nav button:hover { background: var(--bg); }

.weekday-cell {
  text-align: center; font-size: 0.8rem; font-weight: 600;
  padding: 6px 4px;
}

.month-grid { display: grid; grid-template-columns: repeat(7, minmax(min-content, 1fr)); gap: 2px; margin-bottom: 8px; }

.day-cell {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: var(--radius); min-height: 80px; padding: 4px;
  cursor: pointer; transition: box-shadow 0.15s;
  display: flex; flex-direction: column;
}
.day-cell:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.day-cell.empty { background: transparent; border: none; cursor: default; min-height: 0; }
.day-cell.empty:hover { box-shadow: none; }
.day-cell.today { border: 3px solid var(--today-border); background: var(--today-bg); box-shadow: 0 0 0 1px var(--today-border); }
.day-cell.selected-day { box-shadow: 0 0 0 2px var(--accent); }

.day-number { font-size: 0.85rem; font-weight: 600; padding: 2px 4px; border-radius: 4px; display: inline-block; margin-bottom: 2px; line-height: 1; }
.day-cell.sunday .day-number, .day-cell.holiday .day-number { color: var(--sunday); }
.day-cell.saturday .day-number { color: var(--saturday); }
.day-cell.today .day-number { background: linear-gradient(135deg, #81C784, #4CAF50); color: white; padding: 3px 6px; }

.holiday-name { font-size: 0.55rem; color: var(--holiday); line-height: 1.1; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.day-events { flex: 1; overflow: visible; }
.day-event-item {
  font-size: 0.65rem; padding: 2px 4px; margin-bottom: 1px;
  border-radius: 3px; white-space: nowrap;
  line-height: 1.3;
}
.day-event-item.color-0 { background: var(--color0-bg); border-left: 3px solid var(--color0); }
.day-event-item.color-1 { background: var(--color1-bg); border-left: 3px solid var(--color1); }
.day-event-item.color-2 { background: var(--color2-bg); border-left: 3px solid var(--color2); }
.day-event-item.color-3 {
  background: linear-gradient(90deg, #FEE2E2 0%, #FECACA 100%);
  border-left: 4px solid var(--color3); font-weight: 700; color: #991B1B;
  position: relative;
}

/* 済み表示 */
.day-event-item.done-item { opacity: 0.45; text-decoration: line-through; }

.detail-event-card {
  background: #FFFFFF; border-radius: 10px;
  padding: 16px 18px; margin-bottom: 14px;
  transition: box-shadow 0.15s, opacity 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  border: 1px solid var(--border);
}
.detail-event-card:hover { box-shadow: 0 3px 12px rgba(0,0,0,0.1); }
.detail-event-card.color-0 { border-left: 5px solid var(--color0); }
.detail-event-card.color-1 { border-left: 5px solid var(--color1); }
.detail-event-card.color-2 { border-left: 5px solid var(--color2); }
.detail-event-card.color-3 {
  border-left: 5px solid var(--color3);
  background: linear-gradient(135deg, #FEF2F2, #FEE2E2);
  box-shadow: 0 0 0 1px #FECACA, 0 2px 8px rgba(220,38,38,0.12);
}

/* 済みカード */
.detail-event-card.done-card { opacity: 0.45; }
.detail-event-card.done-card .detail-event-title { text-decoration: line-through; }
.detail-event-card.done-card .detail-event-time { text-decoration: line-through; }

.detail-event-time { font-size: 0.8rem; font-weight: 600; color: var(--text-light); margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
.detail-event-time::before { content: '🕐'; font-size: 0.75rem; }
.detail-event-title { font-size: 1.05rem; font-weight: 700; margin-bottom: 8px; color: var(--text); line-height: 1.4; }
.detail-event-detail { font-size: 0.88rem; color: var(--text-light); white-space: pre-wrap; line-height: 1.6; padding: 10px 12px; background: var(--bg); border-radius: 6px; margin-bottom: 4px; }


.detail-event-actions { display: flex; gap: 6px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); flex-wrap: wrap; }
.detail-event-actions button {
  padding: 6px 12px; border-radius: 6px;
  border: 1px solid var(--border); background: white;
  cursor: pointer; font-size: 0.78rem; font-weight: 500; transition: all 0.15s;
}
.detail-event-actions .done-btn { color: #059669; border-color: #A7F3D0; }
.detail-event-actions .done-btn:hover { background: #ECFDF5; }
.detail-event-actions .undone-btn { color: #D97706; border-color: #FDE68A; }
.detail-event-actions .undone-btn:hover { background: #FFFBEB; }
.detail-event-actions .edit-btn:hover { background: var(--color0-bg); border-color: var(--color0); }
.detail-event-actions .delete-btn { color: #DC2626; border-color: #FCA5A5; }
.detail-event-actions .delete-btn:hover { background: #FEF2F2; }

.detail-no-events { text-align: center; color: #9CA3AF; padding: 40px 20px; font-size: 0.95rem; line-height: 1.6; }

.modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal.hidden { display: none; }
.modal-content { background: white; border-radius: 12px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; padding: 20px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.modal-header h3 { font-size: 1.1rem; font-weight: 700; }
.confirm-content { max-width: 360px; text-align: center; }
.confirm-content h3 { margin-bottom: 12px; }
.confirm-content p { margin-bottom: 16px; color: var(--text-light); font-size: 0.9rem; }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; color: var(--text-light); }
.form-group input[type="text"], .form-group input[type="time"], .form-group input[type="date"],
.form-group input[type="number"], .form-group textarea, .form-group select {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 0.9rem; font-family: inherit; background: white;
}
.form-group input:focus, .form-group textarea:focus, .form-group select:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(107,175,122,0.3);
}

.color-picker { display: flex; gap: 12px; align-items: center; }
.color-option { width: 36px; height: 36px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform 0.15s, border-color 0.15s; }
.color-option:hover { transform: scale(1.1); }
.color-option.selected { border-color: var(--text); transform: scale(1.15); }
.color-label { font-size: 0.75rem; color: var(--text-light); margin-left: -4px; }

.weekday-selector, .nth-selector { display: flex; gap: 6px; flex-wrap: wrap; }
.weekday-btn, .nth-btn { padding: 6px 12px; border: 1px solid var(--border); border-radius: var(--radius); background: white; cursor: pointer; font-size: 0.8rem; transition: all 0.15s; }
.weekday-btn.active, .nth-btn.active { background: linear-gradient(135deg, #81C784, #4CAF50); color: white; border-color: #4CAF50; }

.interval-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.interval-row span { font-size: 0.85rem; white-space: nowrap; }
.interval-row select { width: auto; padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.9rem; background: white; }

.monthly-day-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.monthly-day-row span { font-size: 0.85rem; white-space: nowrap; }
.monthly-day-row select { width: auto; padding: 6px 8px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.9rem; background: white; }

.mini-cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.mini-cal-nav span { font-weight: 600; font-size: 0.9rem; }
.mini-cal-nav button { width: 28px; height: 28px; border: 1px solid var(--border); border-radius: var(--radius); background: white; cursor: pointer; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; }
.mini-cal-nav button:hover { background: var(--bg); }
.mini-cal-weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.7rem; font-weight: 600; color: var(--text-light); margin-bottom: 4px; }
.mini-cal-weekdays span:first-child { color: var(--sunday); }
.mini-cal-weekdays span:last-child { color: var(--saturday); }
.mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.mini-cal-day { padding: 6px 2px; text-align: center; border-radius: 4px; cursor: pointer; font-size: 0.8rem; border: 1px solid transparent; transition: all 0.12s; }
.mini-cal-day:hover { background: var(--bg); }
.mini-cal-day.empty { cursor: default; }
.mini-cal-day.empty:hover { background: transparent; }
.mini-cal-day.checked { background: linear-gradient(135deg, #81C784, #4CAF50); color: white; font-weight: 700; }
.mini-cal-day.sun { color: var(--sunday); }
.mini-cal-day.sat { color: var(--saturday); }
.mini-cal-day.checked.sun, .mini-cal-day.checked.sat { color: white; }

.selected-dates-summary { margin-top: 8px; padding: 8px; background: var(--bg); border-radius: var(--radius); font-size: 0.8rem; color: var(--text-light); max-height: 80px; overflow-y: auto; }
.selected-dates-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.date-chip { display: inline-flex; align-items: center; gap: 3px; padding: 2px 8px; background: #E8F5E9; border-radius: 12px; font-size: 0.75rem; color: var(--text); }
.date-chip button { background: none; border: none; cursor: pointer; color: var(--text-light); font-size: 0.8rem; padding: 0; line-height: 1; }
.date-chip button:hover { color: var(--sunday); }

.primary-btn { width: 100%; padding: 10px 20px; background: linear-gradient(135deg, #81C784, #4CAF50); color: white; border: none; border-radius: var(--radius); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.15s; box-shadow: 0 2px 8px rgba(76,175,80,0.25); }
.primary-btn:hover { opacity: 0.85; }
.secondary-btn { padding: 10px 20px; background: white; color: var(--text); border: 1px solid var(--border); border-radius: var(--radius); font-size: 0.9rem; cursor: pointer; }
.secondary-btn:hover { background: var(--bg); }
.close-btn { width: 32px; height: 32px; border: none; background: none; font-size: 1.2rem; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
.close-btn:hover { background: var(--bg); }
.form-actions { display: flex; gap: 8px; margin-top: 16px; }
.form-actions .primary-btn { flex: 1; }
.form-actions .secondary-btn { flex: 1; }

.recurrence-options { padding: 12px; background: var(--bg); border-radius: var(--radius); margin-bottom: 14px; }
.recurrence-options.hidden { display: none; }

.sync-body { padding: 0 4px; }
.sync-description { font-size: 0.85rem; color: var(--text-light); margin-bottom: 12px; line-height: 1.5; }
.sync-status { margin-top: 8px; padding: 8px; border-radius: var(--radius); font-size: 0.8rem; text-align: center; }
.sync-status.connected { background: #E8F5E9; color: #065F46; }
.sync-status.error { background: #FEF2F2; color: #DC2626; }

hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

#panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 190; display: none; }

@media (max-width: 768px) {
  #main-layout { display: block; }
  #detail-panel { position: fixed; right: 0; top: 0; bottom: 0; width: 100%; min-width: unset; z-index: 200; transition: transform 0.25s ease; }
  #detail-panel.hidden { transform: translateX(100%); width: 100%; min-width: unset; overflow: hidden; border-left: none; box-shadow: none; }
  .panel-header, .panel-body, .panel-footer { min-width: unset; }
  #panel-overlay.active { display: block; }
  .day-cell { min-height: 60px; padding: 2px; }
  .day-number { font-size: 0.75rem; }
  .day-event-item { font-size: 0.55rem; padding: 1px 3px; }
  .holiday-name { font-size: 0.5rem; }
  .weekday-cell { font-size: 0.7rem; }
  .month-header h2 { font-size: 1.1rem; }
}
@media (max-width: 480px) {
  .day-cell { min-height: 48px; }
  .day-event-item { font-size: 0.5rem; }
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.month-block { animation: fadeIn 0.3s ease; }

/* 未完予定枠 */
.incomplete-section {
  margin: 4px 8px 12px; padding: 12px; background: #F0F8F0;
  border: 2px solid #A5D6A7; border-radius: var(--radius);
  animation: fadeIn 0.3s ease;
  box-sizing: border-box;
}
.incomplete-header {
  font-size: 1rem; font-weight: 700; color: #2E7D32;
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
}
.incomplete-header::before { content: '📋'; font-size: 1.1rem; }
.incomplete-table { width: 100%; border-collapse: collapse; }
.incomplete-table th {
  text-align: left; font-size: 0.75rem; color: var(--text-light);
  padding: 4px 8px; border-bottom: 1px solid #C8E6C9;
  white-space: nowrap;
}
.incomplete-table td {
  padding: 6px 8px; border-bottom: 1px solid #C8E6C9;
  font-size: 0.85rem; vertical-align: middle;
}
.incomplete-row { cursor: pointer; transition: background 0.15s; }
.incomplete-row:hover { background: #E8F5E9; }
.incomplete-row:last-child td { border-bottom: none; }
.incomplete-row .inc-date { white-space: nowrap; color: var(--text-light); min-width: 90px; }
.incomplete-row .inc-time { white-space: nowrap; color: var(--text); min-width: 50px; }
.incomplete-row .inc-title { color: var(--text); font-weight: 500; }
.incomplete-color-dot {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  margin-right: 4px; vertical-align: middle; flex-shrink: 0;
}
.detail-event-date-label {
  font-size: 0.75rem; color: var(--text-light); font-weight: 600;
  margin-bottom: 2px;
}
.incomplete-empty {
  font-size: 0.85rem; color: var(--text-light); padding: 4px 0;
}
@media(max-width:900px){
  .incomplete-table th:first-child, .incomplete-table td:first-child { padding-left: 4px; }
  .incomplete-table td { font-size: 0.8rem; padding: 5px 4px; }
}

/* ウィジェット内タグ */
.tag-options { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.tag-label {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 10px; border: 1px solid var(--border); border-radius: 20px;
  font-size: 0.8rem; cursor: pointer; transition: all 0.15s;
  background: white; color: var(--text); user-select: none;
}
.tag-label:hover { border-color: #81C784; background: #F0F8F0; }
.tag-label input[type="checkbox"] { accent-color: #4CAF50; margin: 0; width: 14px; height: 14px; }
.tag-label.checked { background: #E8F5E9; border-color: #81C784; color: #2E7D32; font-weight: 600; }
.widget-tag { display: inline-block; font-size: 0.75rem; font-weight: 800; color: #fff; background: linear-gradient(135deg, #66BB6A, #43A047); padding: 3px 10px; border-radius: 6px; margin-right: 4px; margin-top: 2px; box-shadow: 0 1px 4px rgba(76,175,80,0.35); letter-spacing: 0.5px; }
/* タグ設定モーダル */
.tag-setting-list { margin-top: 8px; }
.tag-setting-item { display: flex; align-items: center; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); }
.tag-setting-item:last-child { border-bottom: none; }
.tag-delete-btn { background: none; border: none; color: #E53935; cursor: pointer; font-size: 1rem; padding: 2px 6px; }
.tag-delete-btn:hover { background: #FFEBEE; border-radius: 4px; }

/* 設定モーダル タブ */
.settings-tabs {
  display: flex; border-bottom: 2px solid var(--border); padding: 0 20px;
}
.settings-tab {
  padding: 10px 16px; border: none; background: none; cursor: pointer;
  font-size: 0.85rem; font-weight: 600; color: var(--text-light);
  border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.15s;
}
.settings-tab:hover { color: var(--text); }
.settings-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.settings-tab-body { padding: 16px 20px; }
.settings-tab-pane { display: none; }
.settings-tab-pane.active { display: block; }

/* 当日予定ウィジェット */
.today-widget {
  margin: 0 8px 8px; padding: 10px 8px;
  position: relative; z-index: 10; box-sizing: border-box;
  background: linear-gradient(135deg, #FFF5F5 0%, #FFE8EC 40%, #FFF0F0 100%);
  border-radius: 16px; border: 1px solid #F0C0C8;
  box-shadow: 0 2px 12px rgba(220,120,140,0.1);
  overflow: hidden;
}
.today-widget::before {
  content: ''; position: absolute; top: 10px; right: 18px;
  width: 2px; height: 50px; background: linear-gradient(180deg, #8BC34A, #A5D6A7);
  border-radius: 1px; opacity: 0.25;
}
.today-widget::after {
  content: '❀'; position: absolute; top: 12px; right: 10px;
  font-size: 1.2rem; color: #A5D6A7; opacity: 0.3;
}
.widget-header {
  display: flex; flex-direction: row; align-items: center; gap: 10px; margin-bottom: 6px;
  position: relative; z-index: 1;
}
.widget-header-title {
  font-size: 1.05rem; font-weight: 700; color: #2E7D32;
  letter-spacing: 1px;
}
.widget-date {
  font-size: 0.78rem; color: #4A7A56; font-weight: 600;
  background: rgba(255,255,255,0.7); padding: 3px 12px;
  border-radius: 12px; letter-spacing: 0.5px;
}
.widget-events { position: relative; z-index: 1; }
.widget-event-row {
  display: flex; align-items: center; gap: 10px;
  padding: 5px 12px; margin-bottom: 3px;
  background: rgba(255,255,255,0.75); border-radius: 10px;
  border: 1px solid #81C784;
  backdrop-filter: blur(4px); transition: background 0.15s;
}
.widget-event-row:hover { background: rgba(255,255,255,0.95); }
.widget-event-row:last-child { margin-bottom: 0; }
.widget-time-text { font-size: 0.8rem; font-weight: 600; color: #3E6B4A; white-space: nowrap; flex-shrink: 0; }
.widget-event-content {
  flex: 1; min-width: 0;
}
.widget-event-title {
  font-size: 0.85rem; font-weight: 600; color: #1F2937;
  white-space: normal; overflow-wrap: break-word;
}
.widget-event-detail {
  font-size: 0.75rem; color: #6B7280; margin-top: 2px;
  white-space: normal; overflow-wrap: break-word;
}
.widget-event-row.important {
  background: linear-gradient(135deg, #FEE2E2 0%, #FECACA 50%, #FCA5A5 100%);
  border: 2px solid #EF4444; box-shadow: 0 0 12px rgba(239,68,68,0.25);
  animation: pulseImportant 2s ease-in-out infinite;
}
.widget-event-row.important .widget-time-badge {
  background: linear-gradient(135deg, #DC2626, #B91C1C);
}
.widget-event-row.important .widget-event-title {
  color: #991B1B; font-weight: 800;
}
.widget-event-row.important .widget-event-detail {
  color: #B91C1C;
}
@keyframes pulseImportant {
  0%, 100% { box-shadow: 0 0 8px rgba(239,68,68,0.2); }
  50% { box-shadow: 0 0 16px rgba(239,68,68,0.4); }
}
.widget-event-row.widget-done {
  opacity: 0.25;
}
.widget-event-row.widget-done .widget-event-title {
  text-decoration: line-through;
}
.widget-photos {
  display: inline-flex; align-items: center; gap: 2px; margin-left: 6px; vertical-align: middle;
}
.widget-photo-icon {
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 0.85rem; cursor: pointer; opacity: 0.6; transition: opacity 0.15s;
}
.widget-photo-icon:hover { opacity: 1; }
.widget-empty {
  text-align: center; padding: 8px; color: #4A7A56;
  font-size: 0.85rem; opacity: 0.7; font-style: italic;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }

/* Site selector styles */
.site-selector-wrap {
  display: flex; align-items: center; gap: 4px; min-width: 0; flex: 1;
}
.site-selector-wrap select {
  padding: 4px 8px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 0.82rem; background: white; cursor: pointer; font-family: inherit;
  max-width: 140px; min-width: 0;
}
.site-selector-wrap select:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(107,175,122,0.3);
}

/* Site management modal */
.site-list { margin-top: 12px; }
.site-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  margin-bottom: 6px; background: white;
}
.site-item .site-item-name { font-size: 0.9rem; font-weight: 500; }
.site-item .site-item-default { font-size: 0.75rem; color: var(--text-light); margin-left: 8px; }
.site-item-actions { display: flex; gap: 4px; }
.site-item button.site-rename-btn {
  padding: 4px 10px; border: 1px solid var(--border); border-radius: var(--radius);
  background: white; color: var(--text); cursor: pointer; font-size: 0.78rem; transition: all 0.15s;
}
.site-item button.site-rename-btn:hover { background: var(--bg); border-color: var(--accent); }
.site-item button.site-delete-btn {
  padding: 4px 10px; border: 1px solid #FCA5A5; border-radius: var(--radius);
  background: white; color: #DC2626; cursor: pointer; font-size: 0.78rem; transition: all 0.15s;
}
.site-item button.site-delete-btn:hover { background: #FEF2F2; }
.site-add-row {
  display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
}
.site-add-row input {
  flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 0.9rem; font-family: inherit; background: white;
}
.site-add-row input:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 2px rgba(107,175,122,0.3);
}

/* Photo styles */
.photo-input-wrap { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.photos-preview-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
.photo-preview-item { position: relative; display: inline-block; }
.photo-preview-item img { width: 80px; height: 80px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }
.photo-remove-btn { position: absolute; top: -6px; right: -6px; width: 20px; height: 20px; border-radius: 50%; border: none; background: #DC2626; color: white; font-size: 0.7rem; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }
.detail-photos-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.detail-event-photo { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); transition: opacity 0.15s; }
.detail-event-photo:hover { opacity: 0.8; }
#photo-lightbox { background: rgba(0,0,0,0.92); z-index: 400; touch-action: none; user-select: none; -webkit-user-select: none; }
#photo-lightbox:not(.hidden) { display: flex; }
#photo-lightbox .lightbox-inner { position: relative; width: 100%; height: 100%; overflow: hidden; }
.lightbox-img { position: absolute; top: 0; left: 0; transform-origin: 0 0; will-change: transform; max-width: none; max-height: none; }
.lightbox-close-btn { position: absolute; top: 12px; right: 16px; z-index: 420; width: 44px; height: 44px; border-radius: 50%; border: none; background: rgba(255,255,255,0.2); color: white; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); transition: background 0.15s; }
.lightbox-close-btn:hover { background: rgba(255,255,255,0.4); }
.lightbox-zoom-controls { position: absolute; bottom: 20px; right: 20px; z-index: 420; display: flex; gap: 8px; }
.lightbox-zoom-btn { width: 44px; height: 44px; border-radius: 50%; border: none; background: rgba(255,255,255,0.2); color: white; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); transition: background 0.15s; }
.lightbox-zoom-btn:hover { background: rgba(255,255,255,0.4); }
.lightbox-zoom-hint { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.5); font-size: 0.75rem; pointer-events: none; transition: opacity 0.3s; }
.lightbox-nav-btn {
  position: absolute; top: 50%; transform: translateY(-50%); z-index: 420;
  width: 48px; height: 48px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.2); color: white; font-size: 1.3rem;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(4px); transition: background 0.15s;
}
.lightbox-nav-btn:hover { background: rgba(255,255,255,0.4); }
.lightbox-nav-btn.hidden { display: none; }
.lightbox-nav-prev { left: 12px; }
.lightbox-nav-next { right: 12px; }
.lightbox-counter {
  position: absolute; top: 16px; left: 50%; transform: translateX(-50%); z-index: 420;
  color: rgba(255,255,255,0.8); font-size: 0.85rem; font-weight: 600;
  background: rgba(0,0,0,0.4); padding: 4px 12px; border-radius: 12px;
}
.lightbox-counter.hidden { display: none; }
</style>
</head>
<body>

<header id="app-header">
  <div class="site-selector-wrap">
    <select id="site-select"></select>
  </div>
  <div class="header-actions">
    <button id="btn-refresh" class="header-btn" title="最新データに更新">🔄</button>
    <button id="btn-open-settings" class="header-btn" title="設定">⚙️ 設定</button>
  </div>
</header>
<div id="sync-bar" style="display:none;text-align:center;padding:4px 8px;font-size:0.8rem;font-weight:bold;transition:all 0.3s;"></div>

<div id="main-layout">
  <div id="main-left">
    <div id="today-widget" class="today-widget"></div>
    <div id="calendar-container"></div>
  </div>
  <div id="detail-panel" class="hidden">
    <div class="panel-header">
      <h2 id="detail-date-title"></h2>
      <button id="btn-close-detail" class="close-btn">✕</button>
    </div>
    <div class="panel-body">
      <div id="detail-events-list"></div>
    </div>
    <div class="panel-footer">
      <button id="btn-add-event" class="primary-btn">＋ 予定を追加</button>
    </div>
  </div>
</div>

<div id="panel-overlay"></div>

<!-- 予定モーダル -->
<div id="event-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3 id="modal-title">予定を追加</h3>
      <button id="btn-close-modal" class="close-btn">✕</button>
    </div>
    <form id="event-form">
      <div class="form-group" id="edit-date-group" style="display:none">
        <label>日付</label>
        <input type="date" id="event-date">
      </div>
      <div class="form-group">
        <label>時間（空欄可）</label>
        <input type="time" id="event-time">
      </div>
      <div class="form-group">
        <label>表題（空欄可）</label>
        <input type="text" id="event-title" maxlength="50" placeholder="予定の表題">
      </div>
      <div class="form-group">
        <label>詳細</label>
        <textarea id="event-detail" rows="3" placeholder="予定の詳細（任意）"></textarea>
      </div>
      <div class="form-group">
        <label>色</label>
        <div id="color-picker" class="color-picker">
          <button type="button" class="color-option selected" data-color="0" style="background:#6BAF7A" title="緑"></button>
          <span class="color-label">緑</span>
          <button type="button" class="color-option" data-color="1" style="background:#E74C3C" title="赤"></button>
          <span class="color-label">赤</span>
          <button type="button" class="color-option" data-color="2" style="background:#E67E22" title="濃いオレンジ"></button>
          <span class="color-label">橙</span>
          <button type="button" class="color-option" data-color="3" style="background:#DC2626;box-shadow:0 0 8px rgba(220,38,38,0.4)" title="重要"></button>
          <span class="color-label" style="color:#DC2626;font-weight:700">重要</span>
        </div>
      </div>

      <div class="form-group" id="photo-group">
        <label>写真（任意・最大10枚）</label>
        <div class="photo-input-wrap">
          <input type="file" id="event-photo" accept="image/*" multiple style="display:none">
          <button type="button" id="btn-select-photo" class="secondary-btn" style="font-size:0.85rem">📷 写真を追加</button>
          <span id="photo-count" style="font-size:0.8rem;color:#6B7280"></span>
        </div>
        <div id="photos-preview-grid" class="photos-preview-grid"></div>
      </div>

      <div class="form-group" id="tag-group">
        <label>ウィジェット内のタグ</label>
        <div class="tag-options" id="tag-options-container"></div>
      </div>

      <div class="form-group" id="recurrence-group">
        <label>繰り返し</label>
        <select id="recurrence-type">
          <option value="none">なし</option>
          <option value="weekly">N週間ごと</option>
          <option value="monthly">毎月何日</option>
          <option value="nth-weekday">第N曜日</option>
          <option value="custom">カスタム（カレンダーから複数日選択）</option>
        </select>
      </div>

      <div id="weekly-options" class="recurrence-options hidden">
        <div class="interval-row">
          <span>繰り返し間隔:</span>
          <select id="week-interval">
            <option value="1">毎週</option>
            <option value="2">2週間ごと</option>
            <option value="3">3週間ごと</option>
            <option value="4">4週間ごと</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:10px">
          <label>曜日を選択</label>
          <div class="weekday-selector">
            <button type="button" class="weekday-btn" data-day="0">日</button>
            <button type="button" class="weekday-btn" data-day="1">月</button>
            <button type="button" class="weekday-btn" data-day="2">火</button>
            <button type="button" class="weekday-btn" data-day="3">水</button>
            <button type="button" class="weekday-btn" data-day="4">木</button>
            <button type="button" class="weekday-btn" data-day="5">金</button>
            <button type="button" class="weekday-btn" data-day="6">土</button>
          </div>
        </div>
        <div class="form-group" style="display:none"><input type="date" id="recurrence-end-date"></div>
      </div>

      <div id="monthly-options" class="recurrence-options hidden">
        <div class="monthly-day-row"><span>毎月</span><select id="monthly-day"></select><span>日</span></div>
        <div class="form-group" style="display:none"><input type="date" id="monthly-end-date"></div>
      </div>

      <div id="nth-weekday-options" class="recurrence-options hidden">
        <div class="form-group">
          <label>曜日</label>
          <select id="nth-weekday-day">
            <option value="0">日曜日</option><option value="1">月曜日</option><option value="2">火曜日</option>
            <option value="3">水曜日</option><option value="4">木曜日</option><option value="5">金曜日</option><option value="6">土曜日</option>
          </select>
        </div>
        <div class="form-group">
          <label>第何週（複数選択可）</label>
          <div class="nth-selector">
            <button type="button" class="nth-btn" data-nth="1">第1</button>
            <button type="button" class="nth-btn" data-nth="2">第2</button>
            <button type="button" class="nth-btn" data-nth="3">第3</button>
            <button type="button" class="nth-btn" data-nth="4">第4</button>
            <button type="button" class="nth-btn" data-nth="5">第5</button>
          </div>
        </div>
        <div class="form-group" style="display:none"><input type="date" id="nth-end-date"></div>
      </div>

      <div id="custom-options" class="recurrence-options hidden">
        <label style="margin-bottom:8px;display:block">カレンダーから日付をタップして選択</label>
        <div class="mini-cal-nav">
          <button type="button" id="mini-cal-prev">◀</button>
          <span id="mini-cal-title"></span>
          <button type="button" id="mini-cal-next">▶</button>
        </div>
        <div class="mini-cal-weekdays"><span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span></div>
        <div id="mini-cal-grid" class="mini-cal-grid"></div>
        <div id="selected-dates-summary" class="selected-dates-summary" style="display:none">
          <strong>選択中: <span id="selected-count">0</span>日</strong>
          <div id="selected-dates-chips" class="selected-dates-chips"></div>
        </div>
      </div>

      <div id="extend-end-group" class="form-group" style="display:none">
        <label>繰り返し終了日を変更</label>
        <input type="date" id="extend-end-date">
        <p style="font-size:0.75rem;color:var(--text-light);margin-top:4px;">終了日を変更すると、予定が追加または削除されます。</p>
      </div>

      <div class="form-actions">
        <button type="button" id="btn-cancel-event" class="secondary-btn">キャンセル</button>
        <button type="submit" class="primary-btn">保存</button>
      </div>
    </form>
  </div>
</div>

<div id="confirm-dialog" class="modal hidden">
  <div class="modal-content confirm-content" onclick="event.stopPropagation()">
    <h3 id="confirm-title">確認</h3>
    <p id="confirm-message"></p>
    <div id="confirm-actions" class="form-actions">
      <button class="secondary-btn" id="cb-cancel">キャンセル</button>
      <button class="secondary-btn" id="cb-single" style="display:none;color:#DC2626">この日のみ</button>
      <button class="primary-btn" id="cb-ok" style="background:#DC2626">削除</button>
    </div>
  </div>
</div>

<div id="settings-modal" class="modal hidden">
  <div class="modal-content">
    <div class="modal-header">
      <h3>設定</h3>
      <button id="btn-close-settings" class="close-btn">✕</button>
    </div>
    <div class="settings-tabs">
      <button class="settings-tab active" data-tab="tab-site">カレンダー</button>
      <button class="settings-tab" data-tab="tab-tag">タグ</button>
      <button class="settings-tab" data-tab="tab-display">表示</button>
      <button class="settings-tab" data-tab="tab-sync">同期</button>
    </div>
    <div class="settings-tab-body">
      <div id="tab-site" class="settings-tab-pane active">
        <p class="sync-description">カレンダーを追加・削除できます。各カレンダーのデータは独立しています。</p>
        <div class="site-add-row">
          <input type="text" id="new-site-name" placeholder="新しいカレンダー名を入力" maxlength="20">

        </div>
        <div id="site-list" class="site-list"></div>
      </div>
      <div id="tab-tag" class="settings-tab-pane">
        <p class="sync-description">ウィジェット内のタグを管理できます。</p>
        <div class="site-add-row">
          <input type="text" id="new-tag-name" placeholder="新しいタグを入力（例：薬準備）" maxlength="10">
          <button id="btn-add-tag" class="primary-btn" style="width:auto;padding:8px 16px">追加</button>
        </div>
        <div id="tag-setting-list" class="tag-setting-list"></div>
      </div>
      <div id="tab-display" class="settings-tab-pane">
        <p class="sync-description">各セクションの表示/非表示を切り替えます。</p>
        <div style="display:flex;flex-direction:column;gap:12px;">
          <label style="display:flex;align-items:center;gap:8px;font-size:0.9rem;cursor:pointer;">
            <input type="checkbox" id="chk-show-widget" checked style="width:18px;height:18px;accent-color:#4CAF50;">
            本日の予定（ウィジェット）を表示
          </label>
          <label style="display:flex;align-items:center;gap:8px;font-size:0.9rem;cursor:pointer;">
            <input type="checkbox" id="chk-show-incomplete" checked style="width:18px;height:18px;accent-color:#4CAF50;">
            前日までの未完了の予定を表示
          </label>
        </div>
      </div>
      <div id="tab-sync" class="settings-tab-pane">
        <p class="sync-description">デバイス間でデータを共有するには、同じユーザーIDを設定してください。</p>
        <div class="form-group"><label>ユーザーID（共有キー）</label><input type="text" id="fb-userId" placeholder="共有するデバイスで同じIDを設定"></div>
        <input type="hidden" id="fb-apiKey"><input type="hidden" id="fb-authDomain"><input type="hidden" id="fb-projectId"><input type="hidden" id="fb-storageBucket">
        <div class="form-actions">
          <button id="btn-save-sync" class="primary-btn">保存して接続</button>
          <button id="btn-gen-share-link" class="secondary-btn">共有リンク生成</button>
          <button id="btn-disconnect-sync" class="secondary-btn">切断</button>
        </div>
        <div id="share-link-output" style="display:none;margin-top:8px">
          <input type="text" id="share-link-url" readonly style="width:100%;padding:6px;font-size:0.8rem;border:1px solid var(--border);border-radius:var(--radius)">
          <button id="btn-copy-share-link" class="secondary-btn" style="margin-top:4px;font-size:0.8rem">コピー</button>
        </div>
        <div id="sync-status" class="sync-status"></div>
        <div id="doc-size-in-settings" style="margin-top:8px;font-size:0.8rem;color:#6B7280"></div>

        <div class="form-actions">
          <button id="btn-export" class="secondary-btn">エクスポート</button>
          <button id="btn-import" class="secondary-btn">インポート</button>
        </div>
        <input type="file" id="import-file" accept=".json" style="display:none">
      </div>
    </div>
  </div>
</div>

<div id="photo-lightbox" class="modal hidden">
  <button class="lightbox-close-btn" id="lightbox-close">✕</button>
  <button class="lightbox-nav-btn lightbox-nav-prev" id="lightbox-prev">◀</button>
  <button class="lightbox-nav-btn lightbox-nav-next" id="lightbox-next">▶</button>
  <div class="lightbox-counter" id="lightbox-counter"></div>
  <div class="lightbox-zoom-controls">
    <button class="lightbox-zoom-btn" id="lightbox-zoom-out">−</button>
    <button class="lightbox-zoom-btn" id="lightbox-zoom-in">＋</button>
  </div>
  <div class="lightbox-inner" id="lightbox-inner">
    <img id="lightbox-img" class="lightbox-img">
  </div>
  <div class="lightbox-zoom-hint" id="lightbox-hint">ダブルタップ/ダブルクリックで拡大</div>
</div>

<script>
// ===== Site/Branch switching (runs before main IIFE) =====
(function() {
  'use strict';
  var SITES_KEY = 'calendar_sites';
  var LAST_SITE_KEY = 'calendar_last_site';
  var DEFAULT_SITE = '本部';

  function getSiteList() {
    try {
      var data = localStorage.getItem(SITES_KEY);
      if (data) {
        var list = JSON.parse(data);
        if (Array.isArray(list) && list.length > 0) return list;
      }
    } catch(e) {}
    return [DEFAULT_SITE];
  }

  function saveSiteList(list) {
    localStorage.setItem(SITES_KEY, JSON.stringify(list));
  }

  function getCurrentSite() {
    var params = new URLSearchParams(window.location.search);
    var site = params.get('site');
    if (site) return site;
    return '';
  }

  // Auto-redirect: if no ?site= param, check if this browser has a remembered site
  var urlSite = getCurrentSite();
  if (!urlSite) {
    var lastSite = localStorage.getItem(LAST_SITE_KEY);
    if (lastSite && lastSite !== DEFAULT_SITE) {
      // Redirect to the remembered site
      window.location.href = window.location.pathname + '?site=' + encodeURIComponent(lastSite);
    }
  }

  // Remember the current site for this browser
  function rememberSite(site) {
    localStorage.setItem(LAST_SITE_KEY, site || DEFAULT_SITE);
  }

  // ===== Renamed site old data cleanup =====
  var RENAMED_KEY = 'calendar_renamed_sites';

  // Record old prefix for delayed cleanup (30 days)
  function recordRenamedSite(oldSiteName) {
    var list = getRenamedList();
    var expireDate = new Date();
    expireDate.setDate(expireDate.getDate() + 30);
    list.push({ prefix: getSitePrefixForCleanup(oldSiteName), expireAt: expireDate.toISOString() });
    localStorage.setItem(RENAMED_KEY, JSON.stringify(list));
  }

  function getRenamedList() {
    try { var d = localStorage.getItem(RENAMED_KEY); return d ? JSON.parse(d) : []; } catch(e) { return []; }
  }

  function getSitePrefixForCleanup(siteName) {
    if (!siteName || siteName === DEFAULT_SITE) return '';
    return 'site_' + siteName + '_';
  }

  // Clean up expired renamed site data
  function cleanupRenamedSites() {
    var list = getRenamedList();
    if (list.length === 0) return;
    var now = new Date();
    var remaining = [];
    var suffixes = ['calendar_events', 'calendar_sync_config', 'calendar_last_modified', 'calendar_last_cleanup'];
    for (var i = 0; i < list.length; i++) {
      if (new Date(list[i].expireAt) <= now) {
        // Expired: delete old data
        for (var j = 0; j < suffixes.length; j++) {
          localStorage.removeItem(list[i].prefix + suffixes[j]);
        }
      } else {
        remaining.push(list[i]);
      }
    }
    if (remaining.length === 0) {
      localStorage.removeItem(RENAMED_KEY);
    } else {
      localStorage.setItem(RENAMED_KEY, JSON.stringify(remaining));
    }
  }

  // Run cleanup on every page load
  cleanupRenamedSites();

  // Determine prefix: default site ('本部') or no site param => empty prefix
  // Other sites => 'site_NAME_' prefix
  var currentSite = getCurrentSite();
  var prefix = '';
  if (currentSite && currentSite !== DEFAULT_SITE) {
    prefix = 'site_' + currentSite + '_';
  }

  // Remember this site for auto-redirect next time
  rememberSite(currentSite || DEFAULT_SITE);

  window.__currentSitePrefix = prefix;
  window.__siteUtils = {
    SITES_KEY: SITES_KEY,
    LAST_SITE_KEY: LAST_SITE_KEY,
    DEFAULT_SITE: DEFAULT_SITE,
    getSiteList: getSiteList,
    saveSiteList: saveSiteList,
    getCurrentSite: getCurrentSite,
    rememberSite: rememberSite,
    recordRenamedSite: recordRenamedSite
  };
})();
</script>

    add(1,1,'元日'); add(1,nthMon(1,2),'成人の日'); add(2,11,'建国記念の日'); add(2,23,'天皇誕生日');

    const sorted=Object.keys(holidays).sort();
    for(const key of sorted){const d=new Date(key+'T00:00:00');if(d.getDay()===0){let sub=new Date(d);sub.setDate(sub.getDate()+1);while(holidays[dateToKey(sub)])sub.setDate(sub.getDate()+1);holidays[dateToKey(sub)]='振替休日';}}
    const allKeys=Object.keys(holidays).sort();

  // ===== 画像圧縮 =====
  function compressImage(file) {
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=function(e){
        const img=new Image();
        img.onload=function(){
          // 転送量節約: 最大800px、品質0.6で圧縮
          const maxW=800; let w=img.width,h=img.height;
          if(w>maxW){h=Math.round(h*maxW/w);w=maxW;}
          const canvas=document.createElement('canvas');
          canvas.width=w; canvas.height=h;
          const ctx=canvas.getContext('2d');
          ctx.drawImage(img,0,0,w,h);
          let result=canvas.toDataURL('image/jpeg',0.6);
          // 100KB超えたらさらに圧縮
          if(result.length>100*1024){result=canvas.toDataURL('image/jpeg',0.4);}
          resolve(result);
        };
        img.onerror=function(){reject(new Error('画像の読み込みに失敗しました'));};
        img.src=e.target.result;
      };
      reader.onerror=function(){reject(new Error('ファイルの読み込みに失敗しました'));};
      reader.readAsDataURL(file);
    });
  }

  // ===== 写真プレビュー =====
  const STORAGE_LIMIT_GB = 5;
  function estimateDocSizeKB() {
    // Firestoreドキュメントのサイズを概算（eventsのJSON文字列のバイト数）
    try {
      const json=JSON.stringify(events);
      // UTF-8エンコード: 日本語は3バイト、英数字は1バイト
      let bytes=0;
      for(let i=0;i<json.length;i++){
        const c=json.charCodeAt(i);
        if(c<=0x7F) bytes+=1;
        else if(c<=0x7FF) bytes+=2;
        else bytes+=3;
      }
      // Firestoreオーバーヘッド（フィールド名、メタデータ等）を加算
      bytes+=200;
      return bytes/1024;
    } catch{ return 0; }
  }
  function updateDocSizeDisplay() {
    const el=document.getElementById('doc-size-in-settings');
    if(!el) return;
    if(!firebaseDb){ el.textContent=''; return; }
    const kb=estimateDocSizeKB();
    if(kb>=1024){
      el.textContent='データ容量: '+(kb/1024).toFixed(1)+'MB / 1MB';
    } else {
      el.textContent='データ容量: '+Math.round(kb)+'KB / 1MB';
    }
    if(kb>=900) el.style.color='#DC2626';
    else if(kb>=700) el.style.color='#F59E0B';
    else el.style.color='#6B7280';
  }
  function updatePhotoCount() {
    const el=document.getElementById('photo-count');
    const btn=document.getElementById('btn-select-photo');
    let countText=photosData.length>0?photosData.length+'/'+MAX_PHOTOS+'枚':'';
    if(firebaseStorage){
      const usedMB=photoUsageBytes/1024/1024;
      const limitGB=STORAGE_LIMIT_GB;
      const capText=usedMB>=1024?(usedMB/1024).toFixed(2)+'GB/'+limitGB+'GB':usedMB.toFixed(1)+'MB/'+limitGB+'GB';
      el.textContent=(countText?countText+' | ':'')+'写真容量 '+capText;
      if(usedMB>=limitGB*1024*0.8) el.style.color='#DC2626';
      else el.style.color='#6B7280';

      el.textContent=(countText?countText+' | ':'')+'写真: Storage未接続';

  // ===== ストレージ =====
  function migratePhotoToPhotos(){
    const keys=Object.keys(events);
    for(let i=0;i<keys.length;i++){
      if(!events[keys[i]]) continue;
      for(let j=0;j<events[keys[i]].length;j++){
        const ev=events[keys[i]][j];
        if(ev.photo&&!ev.photos){ev.photos=[ev.photo];delete ev.photo;}
        if(!ev.photos) ev.photos=[];
      }
    }
  }
  function loadEvents() { try{const d=localStorage.getItem(STORAGE_KEY); events=d?JSON.parse(d):{};}catch{events={};} migratePhotoToPhotos(); }
  function saveEvents() {
    const now=getNow();
    localStorage.setItem(STORAGE_KEY,JSON.stringify(events));

      if(firebaseDb){
        showSyncBar('☁️ 同期中...','#2563EB',false);
        // 前回の同期が完了していなくても強制的に同期実行
        isSyncingToFirebase=false;
        syncToFirebase(now);
      }
    }
  }
  function addEvent(dk,ev) { if(!events[dk]) events[dk]=[]; events[dk].push(ev); }
  function updateEvent(dk,id,updates) { if(!events[dk])return; const idx=events[dk].findIndex(e=>e.id===id); if(idx!==-1) Object.assign(events[dk][idx],updates); }
  function deleteEvent(dk,id) { if(!events[dk])return; deletedIds[id]=getNow(); events[dk]=events[dk].filter(e=>e.id!==id); if(events[dk].length===0) delete events[dk]; }
  function deleteEventsByGroupId(gid) { const keys=Object.keys(events); for(let i=0;i<keys.length;i++){if(!events[keys[i]])continue;events[keys[i]].forEach(e=>{if(e.groupId===gid)deletedIds[e.id]=getNow();});events[keys[i]]=events[keys[i]].filter(e=>e.groupId!==gid); if(events[keys[i]].length===0) delete events[keys[i]];} }
  function getEventsForDate(dk) { const evs=events[dk]; if(!evs||evs.length===0)return[]; return evs.slice().sort((a,b)=>(a.time||'').localeCompare(b.time||'')); }

  // 予定を別の日に移動
  function moveEvent(fromDk, toDk, eventId) {
    if(fromDk===toDk) return;

  // ===== Firebase同期 =====
  // Firebase設定（アプリ埋め込み）
  const EMBEDDED_FIREBASE_CONFIG = {

  // Cookie バックアップ（localStorageが消えた場合の復元用）
  function saveUserIdCookie(userId){
    try{

  function loadSyncConfig() {
    try{

  }
  async function initFirebase() {
    const config=loadSyncConfig();
    if(!config||!config.apiKey||!config.projectId||!config.userId) return;
    try {
      if(!window.firebase){
        await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js');
        await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js');
        await loadScript('https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js');
      }
      const bucket=config.storageBucket||'';
      const appConfig={apiKey:config.apiKey,authDomain:config.authDomain||'',projectId:config.projectId};
      if(bucket) appConfig.storageBucket=bucket;
      // 既存appのstorageBucket設定が異なる場合は再初期化
      if(firebase.apps.length){
        const existing=firebase.app().options;
        if((bucket&&!existing.storageBucket)||existing.storageBucket!==bucket){
          await firebase.app().delete();
        }
      }
      if(!firebase.apps.length) firebase.initializeApp(appConfig);
      firebaseDb=firebase.firestore();
      if(bucket){
        try{ firebaseStorage=firebase.storage(); }
        catch(e){ console.warn('Firebase Storage init error:',e); firebaseStorage=null; }
      } else {
        firebaseStorage=null;
        console.warn('storageBucketが未設定のため写真機能は無効です');

      if(firebaseUnsubscribe) firebaseUnsubscribe();
      initialLoadDone=false;
      showSyncBar('☁️ データ読み込み中...','#2563EB',false);
      firebaseUnsubscribe=firebaseDb.collection('calendars').doc(config.userId)
        .onSnapshot((doc)=>{
          if(doc.exists){
            const rd=doc.data(); const rUpd=rd.updatedAt||''; const lUpd=localStorage.getItem(LAST_MODIFIED_KEY)||'';
            if(typeof rd.photoUsageBytes==='number'){
              photoUsageBytes=Math.max(0,rd.photoUsageBytes);
              if(rd.photoUsageBytes<0){
                firebaseDb.collection('calendars').doc(config.userId).update({photoUsageBytes:0}).catch(()=>{});
              }
            }
            if(!initialLoadDone){
              initialLoadDone=true;
              if(rd.deletedIds) Object.assign(deletedIds, rd.deletedIds);
              // 初回読み込み: 常にFirestoreを正とする
              localStorage.removeItem('pendingSync');
              localStorage.removeItem(PENDING_SYNC_KEY);
              events=rd.events||{};
              deduplicateEvents();
              localStorage.setItem(STORAGE_KEY,JSON.stringify(events));
              localStorage.setItem(LAST_MODIFIED_KEY,rUpd||getNow());
              lastSyncedJSON=JSON.stringify(events);
              showSyncBar('✓ 読み込み完了','#059669',true);
              renderAllMonths(); if(selectedDate) renderDetailPanel(selectedDate);
            } else {
              if(isSyncingToFirebase) return;
              const remoteJSON=JSON.stringify(rd.events||{});
              if(remoteJSON===lastSyncedJSON) return;
              // リモートの削除済みIDを取り込み
              if(rd.deletedIds) Object.assign(deletedIds, rd.deletedIds);
              isSyncingFromFirebase=true;
              events=rd.events||{};
              deduplicateEvents();
              lastSyncedJSON=JSON.stringify(events);
              localStorage.setItem(STORAGE_KEY,JSON.stringify(events)); localStorage.setItem(LAST_MODIFIED_KEY,rUpd);
              showSyncBar('☁️ 他デバイスから更新を受信','#2563EB',true);
              renderAllMonths(); if(selectedDate) renderDetailPanel(selectedDate);
              isSyncingFromFirebase=false;
            }
          } else { initialLoadDone=true; syncToFirebase(getNow()); }
        });
      updateSyncStatus('connected','接続中 ✓');
    } catch(err){ console.error('Firebase init error:',err); updateSyncStatus('error','エラー: '+err.message); }
  }
  function deduplicateEvents() {
    // 同じ日付で同じgroupId+time+titleの予定を重複除去
    for(const dk of Object.keys(events)){
      if(!events[dk]||events[dk].length<=1) continue;
      const seen=new Set();
      events[dk]=events[dk].filter(e=>{
        const key=e.groupId?(e.groupId+'|'+e.time+'|'+e.title):(e.id);
        if(seen.has(key)) return false;
        seen.add(key);
        return true;
      });
      if(events[dk].length===0) delete events[dk];
    }
  }
  function cleanupDeletedIds() {
    const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-30);
    const cutoffStr=cutoff.toISOString();
    for(const id of Object.keys(deletedIds)){
      if(deletedIds[id]<cutoffStr) delete deletedIds[id];
    }
  }
  function syncToFirebase(ts) {
    const c=loadSyncConfig(); if(!firebaseDb||!c?.userId)return;
    cleanupDeletedIds();
    // Firestoreドキュメントサイズチェック（1MB制限）
    const docKB=estimateDocSizeKB();
    if(docKB>=950){
      updateSyncStatus('error','同期停止: 容量超過 '+Math.round(docKB)+'KB/1MB');
      return;
    }
    updateSyncStatus('connected','接続中 ✓ ('+Math.round(docKB)+'KB)');
    // undefinedを完全除去（Firestoreはundefined不可）
    const payload=JSON.parse(JSON.stringify({events:events,deletedIds:deletedIds,updatedAt:ts||getNow(),photoUsageBytes:photoUsageBytes}));
    isSyncingToFirebase=true; lastSyncedJSON=JSON.stringify(events);
    try{
      firebaseDb.collection('calendars').doc(c.userId).set(payload).then(()=>{ isSyncingToFirebase=false; updateDocSizeDisplay(); showSyncBar('✓ 同期完了','#059669',true); }).catch(err=>{ isSyncingToFirebase=false; updateSyncStatus('error','同期エラー: '+err.message); showSyncBar('✕ 同期エラー','#DC2626',false); });
    }catch(e){ isSyncingToFirebase=false; showSyncBar('✕ 同期エラー: '+e.message,'#DC2626',false); }
  }
  function loadScript(src) { return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s);}); }
  function updateSyncStatus(type,msg) { const el=document.getElementById('sync-status'); el.className='sync-status '+type; el.textContent=msg; }
  let syncBarTimer=null;
  function showSyncBar(msg,color,autoHide){
    const bar=document.getElementById('sync-bar');

    if(syncBarTimer) clearTimeout(syncBarTimer);

  // ===== Firebase Storage 写真管理 =====
  function dataUrlToBlob(dataUrl) {
    const parts=dataUrl.split(','); const mime=parts[0].match(/:(.*?);/)[1];
    const bin=atob(parts[1]); const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
    return new Blob([arr],{type:mime});
  }

  async function uploadPhoto(dataUrl) {
    if(!firebaseStorage) {
      alert('写真を保存するにはFirebase Storageの設定が必要です。\n同期設定でStorage Bucketを入力してください。');
      return null; // 保存中止
    }
    const c=loadSyncConfig(); if(!c?.userId) return null;
    try {
      const blob=dataUrlToBlob(dataUrl);
      const photoId=generateId();
      const ref=firebaseStorage.ref('photos/'+c.userId+'/'+photoId+'.jpg');
      // キャッシュ1年: ダウンロード転送量を節約
      await ref.put(blob,{cacheControl:'public,max-age=31536000',contentType:'image/jpeg'});
      const url=await ref.getDownloadURL();
      // 容量カウント更新
      if(firebaseDb){
        firebaseDb.collection('calendars').doc(c.userId).update({
          photoUsageBytes:firebase.firestore.FieldValue.increment(blob.size)
        }).catch(()=>{});
        photoUsageBytes+=blob.size;
      }
      return url;
    } catch(err) {
      console.error('Photo upload error:',err);
      if(err.code==='storage/unauthorized') alert('Firebase Storageのセキュリティルールを確認してください。\nStorage > Rules で読み書きを許可する設定が必要です。');
      else alert('写真のアップロードに失敗しました: '+err.message);
      return null; // 保存中止（base64をlocalStorageに保存しない）
    }
  }

  async function deletePhoto(photoUrl) {
    if(!firebaseStorage||!photoUrl||photoUrl.startsWith('data:')) return;
    const c=loadSyncConfig(); if(!c?.userId) return;
    try {
      const ref=firebaseStorage.refFromURL(photoUrl);
      const meta=await ref.getMetadata();
      const size=meta.size||0;
      await ref.delete();
      if(firebaseDb&&size>0){
        const decrement=Math.min(size,photoUsageBytes);
        if(decrement>0){
          firebaseDb.collection('calendars').doc(c.userId).update({
            photoUsageBytes:firebase.firestore.FieldValue.increment(-decrement)
          }).catch(()=>{});
        }
        photoUsageBytes=Math.max(0,photoUsageBytes-size);
      }
    } catch(err) {
      if(err.code!=='storage/object-not-found') console.error('Photo delete error:',err);
    }
  }

  // ===== カレンダー描画 =====
  // ===== 未完予定枠 =====
  function getIncompleteEvents() {
    var result=[];
    var keys=Object.keys(events);
    for(var i=0;i<keys.length;i++){
      var dk=keys[i];
      if(dk>=todayKey) continue; // 今日以降はスキップ
      var evList=events[dk];
      if(!evList) continue;
      for(var j=0;j<evList.length;j++){
        if(!evList[j].done) result.push({dateKey:dk, event:evList[j]});
      }
    }
    result.sort(function(a,b){ return a.dateKey<b.dateKey?-1:a.dateKey>b.dateKey?1:0; });
    return result;
  }

  // 詳細パネル内の写真クリック→拡大（ズーム対応ライトボックス）
  (function(){
    var lb=document.getElementById('photo-lightbox'),
        lbImg=document.getElementById('lightbox-img'),
        lbInner=document.getElementById('lightbox-inner'),
        lbHint=document.getElementById('lightbox-hint'),
        lbClose=document.getElementById('lightbox-close'),
        btnZoomIn=document.getElementById('lightbox-zoom-in'),
        btnZoomOut=document.getElementById('lightbox-zoom-out');

    // State
    var scale=1, tx=0, ty=0; // tx,ty = translate of image top-left
    var fitW=0, fitH=0; // fitted image display size at scale=1
    var cW=0, cH=0; // container size
    var minScale=1, maxScale=5;

    // Drag state
    var dragging=false, moved=false, startX=0, startY=0, startTx=0, startTy=0;
    // Touch state
    var lastTapTime=0, pinching=false, pinchDist0=0, pinchScale0=1;
    // Pinch center tracking for pan during pinch
    var pinchMidX0=0, pinchMidY0=0, pinchTx0=0, pinchTy0=0;

    function apply(){
      lbImg.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')';
    }

    function clamp(){
      var sw=fitW*scale, sh=fitH*scale;
      if(sw<=cW){
        // 画面より小さい→中央固定
        tx=(cW-sw)/2;
      } else {
        // 画面より大きい→端まで移動可能（余白20px追加で端が見やすい）
        var margin=20;
        if(tx>margin) tx=margin;
        if(tx<cW-sw-margin) tx=cW-sw-margin;
      }
      if(sh<=cH){
        ty=(cH-sh)/2;
      } else {
        var margin=20;
        if(ty>margin) ty=margin;
        if(ty<cH-sh-margin) ty=cH-sh-margin;
      }
    }

    function centerImage(){
      var sw=fitW*scale, sh=fitH*scale;
      tx=(cW-sw)/2; ty=(cH-sh)/2;
    }

    function setScale(newScale, pivotX, pivotY){
      // pivotX, pivotY = screen coords relative to container
      newScale=Math.max(minScale,Math.min(maxScale,newScale));
      if(Math.abs(newScale-scale)<0.001) return;
      // 画像座標系でのピボット点
      var imgX=(pivotX-tx)/scale;
      var imgY=(pivotY-ty)/scale;
      scale=newScale;
      // ピボット点が同じ画面位置に来るようtx,tyを調整
      tx=pivotX-imgX*scale;
      ty=pivotY-imgY*scale;
      clamp(); apply();
      if(lbHint) lbHint.style.opacity=scale>1.05?'0':'1';
    }

    function initFit(){
      // レイアウト確定後にコンテナサイズを取得
      cW=lbInner.clientWidth||window.innerWidth;
      cH=lbInner.clientHeight||window.innerHeight;
      var nw=lbImg.naturalWidth, nh=lbImg.naturalHeight;
      if(!nw||!nh||!cW||!cH) return;
      var r=Math.min(cW*0.9/nw, cH*0.9/nh, 1);
      fitW=nw*r; fitH=nh*r;
      lbImg.style.width=fitW+'px'; lbImg.style.height=fitH+'px';
      scale=1; centerImage(); apply();
      if(lbHint) lbHint.style.opacity='1';
    }

    var lbPhotos=[], lbIndex=0;
    var lbPrev=document.getElementById('lightbox-prev');
    var lbNext=document.getElementById('lightbox-next');
    var lbCounter=document.getElementById('lightbox-counter');

    function updateLbNav(){
      if(lbPhotos.length<=1){
        lbPrev.classList.add('hidden'); lbNext.classList.add('hidden'); lbCounter.classList.add('hidden');
      } else {
        lbPrev.classList.toggle('hidden',lbIndex<=0);
        lbNext.classList.toggle('hidden',lbIndex>=lbPhotos.length-1);
        lbCounter.classList.remove('hidden');
        lbCounter.textContent=(lbIndex+1)+' / '+lbPhotos.length;
      }
    }

    function showLbPhoto(src){
      lbImg.onload=function(){
        requestAnimationFrame(function(){ requestAnimationFrame(function(){ initFit(); }); });
      };
      lbImg.src=src;
      if(lbImg.complete&&lbImg.naturalWidth>0){
        requestAnimationFrame(function(){ requestAnimationFrame(function(){ initFit(); }); });
      }
      updateLbNav();
    }

    function openLightbox(src, photoArray){
      lb.classList.remove('hidden');
      if(photoArray&&photoArray.length>0){
        lbPhotos=photoArray;
        lbIndex=Math.max(0,photoArray.indexOf(src));
      } else {
        lbPhotos=[src]; lbIndex=0;
      }
      showLbPhoto(lbPhotos[lbIndex]);
    }
    // 親スコープ（ウィジェット等）からアクセス可能にする
    window.__openLightbox=openLightbox;

    lbPrev.addEventListener('click',function(e){ e.stopPropagation(); if(lbIndex>0){lbIndex--;showLbPhoto(lbPhotos[lbIndex]);} });
    lbNext.addEventListener('click',function(e){ e.stopPropagation(); if(lbIndex<lbPhotos.length-1){lbIndex++;showLbPhoto(lbPhotos[lbIndex]);} });

    // ウィンドウリサイズ時に再計算
    window.addEventListener('resize',function(){
      if(!lb.classList.contains('hidden')&&lbImg.naturalWidth>0) initFit();
    });
    function closeLightbox(){
      lb.classList.add('hidden'); lbImg.src='';
      scale=1; tx=0; ty=0;
    }

    // --- 写真クリックで開く（同じ予定の全写真を渡す）---
    document.getElementById('detail-events-list').addEventListener('click',function(e){
      var p=e.target.closest('[data-action="show-photo"]');
      if(p){
        var wrap=p.closest('.detail-photos-wrap');
        var siblings=wrap?Array.from(wrap.querySelectorAll('[data-action="show-photo"]')).map(function(img){return img.src;}):[];
        openLightbox(p.src, siblings);
      }
    });

    // --- 閉じる：✕ボタンのみ + Escキー ---
    lbClose.addEventListener('click',function(e){ e.stopPropagation(); closeLightbox(); });
    document.addEventListener('keydown',function(e){
      if(e.key==='Escape'&&!lb.classList.contains('hidden')) closeLightbox();
    });

    // --- ズームボタン（PC用 +/−） ---
    btnZoomIn.addEventListener('click',function(e){ e.stopPropagation(); setScale(scale*1.5, cW/2, cH/2); });
    btnZoomOut.addEventListener('click',function(e){ e.stopPropagation(); setScale(scale/1.5, cW/2, cH/2); });

    // --- ダブルクリック（PC）---
    lbInner.addEventListener('dblclick',function(e){
      e.preventDefault(); e.stopPropagation();
      if(scale>1.05){ scale=1; centerImage(); clamp(); apply(); if(lbHint) lbHint.style.opacity='1'; }
      else{
        var rect=lbInner.getBoundingClientRect();
        setScale(2.5, e.clientX-rect.left, e.clientY-rect.top);
      }
    });

    // --- マウスホイール（PC）---
    lbInner.addEventListener('wheel',function(e){
      e.preventDefault();
      var rect=lbInner.getBoundingClientRect();
      var factor=e.deltaY>0?0.85:1.18;
      setScale(scale*factor, e.clientX-rect.left, e.clientY-rect.top);
    },{passive:false});

    // --- マウスドラッグ（PC） ---
    lbInner.addEventListener('mousedown',function(e){
      if(e.button!==0) return;
      e.preventDefault();
      dragging=true; moved=false;
      startX=e.clientX; startY=e.clientY;
      startTx=tx; startTy=ty;
      lbInner.style.cursor=scale>1.01?'grabbing':'default';
    });
    window.addEventListener('mousemove',function(e){
      if(!dragging) return;
      var dx=e.clientX-startX, dy=e.clientY-startY;
      if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true;
      tx=startTx+dx; ty=startTy+dy;
      clamp(); apply();
    });
    window.addEventListener('mouseup',function(){
      if(!dragging) return;
      dragging=false;
      lbInner.style.cursor=scale>1.01?'grab':'default';
    });

    // --- タッチ：ドラッグ移動 + ピンチズーム + ダブルタップ ---
    lbInner.addEventListener('touchstart',function(e){
      if(e.touches.length===1){
        var now=Date.now();
        if(now-lastTapTime<300){
          e.preventDefault();
          if(scale>1.05){ scale=1; centerImage(); clamp(); apply(); if(lbHint) lbHint.style.opacity='1'; }
          else{
            var rect=lbInner.getBoundingClientRect();
            setScale(2.5, e.touches[0].clientX-rect.left, e.touches[0].clientY-rect.top);
          }
          lastTapTime=0; return;
        }
        lastTapTime=now;
        dragging=true; moved=false; pinching=false;
        startX=e.touches[0].clientX; startY=e.touches[0].clientY;
        startTx=tx; startTy=ty;
      } else if(e.touches.length===2){
        e.preventDefault();
        dragging=false; pinching=true;
        var dx=e.touches[0].clientX-e.touches[1].clientX;
        var dy=e.touches[0].clientY-e.touches[1].clientY;
        pinchDist0=Math.sqrt(dx*dx+dy*dy)||1;
        pinchScale0=scale;
        pinchMidX0=(e.touches[0].clientX+e.touches[1].clientX)/2;
        pinchMidY0=(e.touches[0].clientY+e.touches[1].clientY)/2;
        pinchTx0=tx; pinchTy0=ty;
      }
    },{passive:false});

    lbInner.addEventListener('touchmove',function(e){
      if(e.touches.length===2&&pinching){
        e.preventDefault();
        var dx=e.touches[0].clientX-e.touches[1].clientX;
        var dy=e.touches[0].clientY-e.touches[1].clientY;
        var dist=Math.sqrt(dx*dx+dy*dy)||1;
        var rect=lbInner.getBoundingClientRect();
        var midX=(e.touches[0].clientX+e.touches[1].clientX)/2;
        var midY=(e.touches[0].clientY+e.touches[1].clientY)/2;
        // ピンチ中心でズーム
        var pivotX=pinchMidX0-rect.left;
        var pivotY=pinchMidY0-rect.top;
        var newScale=Math.max(minScale,Math.min(maxScale,pinchScale0*(dist/pinchDist0)));
        var imgX=(pivotX-pinchTx0)/pinchScale0;
        var imgY=(pivotY-pinchTy0)/pinchScale0;
        scale=newScale;
        tx=pivotX-imgX*scale + (midX-pinchMidX0);
        ty=pivotY-imgY*scale + (midY-pinchMidY0);
        clamp(); apply();
        if(lbHint) lbHint.style.opacity=scale>1.05?'0':'1';
      } else if(e.touches.length===1&&dragging){
        var dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
        if(Math.abs(dx)>3||Math.abs(dy)>3) moved=true;
        if(scale>1.01){
          e.preventDefault();
          tx=startTx+dx; ty=startTy+dy;
          clamp(); apply();
        }
      }
    },{passive:false});

    lbInner.addEventListener('touchend',function(){
      dragging=false; pinching=false;
    });
  })();

  // ===== 繰り返し終了日の変更（延長＋短縮） =====
  function changeRecurringEndDate(ev,newEndDate) {
    const info=ev.recurrenceInfo; if(!info)return;
    const gid=ev.groupId;
    let lastDate=''; let firstDate='';
    const keys=Object.keys(events);
    for(let i=0;i<keys.length;i++){
      if(events[keys[i]]&&events[keys[i]].some(e=>e.groupId===gid)){
        if(keys[i]>lastDate) lastDate=keys[i];
        if(!firstDate||keys[i]<firstDate) firstDate=keys[i];
      }
    }
    // 短縮: newEndDateより後の予定を削除
    if(newEndDate<lastDate){
      for(let i=0;i<keys.length;i++){
        if(keys[i]>newEndDate && events[keys[i]]){
          const before=events[keys[i]].length;
          events[keys[i]]=events[keys[i]].filter(e=>e.groupId!==gid);
          if(events[keys[i]].length===0) delete events[keys[i]];
        }
      }
      return;
    }
    // 延長: lastDateより後に新しい予定を追加
    if(!lastDate||newEndDate<=lastDate)return;
    const startDate=new Date(lastDate+'T00:00:00'); startDate.setDate(startDate.getDate()+1);
    const endDate=new Date(newEndDate+'T23:59:59'); let newDates=[];
    if(info.type==='weekly'){let cur=new Date(startDate);cur.setDate(cur.getDate()-cur.getDay());while(cur<=endDate){for(const dow of(info.days||[])){const t=new Date(cur);t.setDate(t.getDate()+dow);if(t>=startDate&&t<=endDate)newDates.push(dateToKey(t));}cur.setDate(cur.getDate()+7*(info.interval||1));}}
    else if(info.type==='monthly'){const dom=info.dayOfMonth;let cur=new Date(startDate.getFullYear(),startDate.getMonth(),1);while(cur<=endDate){const dim=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate();const ad=Math.min(dom,dim);const t=new Date(cur.getFullYear(),cur.getMonth(),ad);if(t>=startDate&&t<=endDate)newDates.push(dateToKey(t));cur.setMonth(cur.getMonth()+1);}}
    else if(info.type==='nth-weekday'){let cur=new Date(startDate.getFullYear(),startDate.getMonth(),1);while(cur<=endDate){for(const nth of(info.nths||[])){const d=getNthWeekday(cur.getFullYear(),cur.getMonth(),info.dow,nth);if(d&&d>=startDate&&d<=endDate)newDates.push(dateToKey(d));}cur.setMonth(cur.getMonth()+1);}}
    const existingDates=new Set();
    for(let i=0;i<keys.length;i++){if(events[keys[i]]&&events[keys[i]].some(e=>e.groupId===gid))existingDates.add(keys[i]);}
    for(let i=0;i<newDates.length;i++){if(!existingDates.has(newDates[i])){addEvent(newDates[i],{id:generateId(),groupId:gid,time:ev.time,title:ev.title,detail:ev.detail,colorIndex:ev.colorIndex,recurrenceInfo:info});}}
  }

  // ===== 繰り返し予定の自動延長（起動時） =====
  function autoExtendRecurringEvents() {
    const now=new Date();
    const threeMonthsLater=new Date(now);
    threeMonthsLater.setMonth(threeMonthsLater.getMonth()+3);
    const threshold=dateToKey(threeMonthsLater);
    // groupIdごとに最後の日付を集計
    const groupLastDate={};
    const groupSample={};
    const keys=Object.keys(events);
    for(let i=0;i<keys.length;i++){
      if(!events[keys[i]]) continue;
      for(let j=0;j<events[keys[i]].length;j++){
        const ev=events[keys[i]][j];
        if(ev.groupId&&ev.recurrenceInfo){
          if(!groupLastDate[ev.groupId]||keys[i]>groupLastDate[ev.groupId]){
            groupLastDate[ev.groupId]=keys[i];
            groupSample[ev.groupId]=ev;
          }
        }
      }
    }
    // 終了日が3ヶ月以内のグループを1年延長
    let extended=false;
    for(const gid of Object.keys(groupLastDate)){
      if(groupLastDate[gid]<=threshold){
        const ev=groupSample[gid];
        const newEnd=new Date(groupLastDate[gid]+'T00:00:00');
        newEnd.setFullYear(newEnd.getFullYear()+1);
        changeRecurringEndDate(ev,dateToKey(newEnd));
        extended=true;
      }
    }
    if(extended){ localStorage.setItem(STORAGE_KEY,JSON.stringify(events)); }
  }

  // ===== 繰り返し日付生成 =====
  function generateRecurringDates(type,startDateKey) {
    const dates=[]; const startDate=new Date(startDateKey+'T00:00:00'); let info={};
    if(type==='weekly'){
      const interval=parseInt(document.getElementById('week-interval').value)||1;
      const selectedDays=[];document.querySelectorAll('.weekday-btn.active').forEach(b=>selectedDays.push(parseInt(b.dataset.day)));
      if(selectedDays.length===0)selectedDays.push(startDate.getDay());
      const endInput=document.getElementById('recurrence-end-date').value;
      const endDate=endInput?new Date(endInput+'T23:59:59'):new Date(startDate);if(!endInput)endDate.setFullYear(endDate.getFullYear()+1);
      info={type:'weekly',interval,days:selectedDays};
      let cur=new Date(startDate);cur.setDate(cur.getDate()-cur.getDay());
      while(cur<=endDate){for(const dow of selectedDays){const t=new Date(cur);t.setDate(t.getDate()+dow);if(t>=startDate&&t<=endDate)dates.push(dateToKey(t));}cur.setDate(cur.getDate()+7*interval);}
    } else if(type==='monthly'){
      const dom=parseInt(document.getElementById('monthly-day').value);
      const endInput=document.getElementById('monthly-end-date').value;
      const endDate=endInput?new Date(endInput+'T23:59:59'):new Date(startDate);if(!endInput)endDate.setFullYear(endDate.getFullYear()+1);
      info={type:'monthly',dayOfMonth:dom};
      let cur=new Date(startDate.getFullYear(),startDate.getMonth(),1);
      while(cur<=endDate){const dim=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate();const ad=Math.min(dom,dim);const t=new Date(cur.getFullYear(),cur.getMonth(),ad);if(t>=startDate&&t<=endDate)dates.push(dateToKey(t));cur.setMonth(cur.getMonth()+1);}
    } else if(type==='nth-weekday'){
      const dow=parseInt(document.getElementById('nth-weekday-day').value);const nths=[];
      document.querySelectorAll('.nth-btn.active').forEach(b=>nths.push(parseInt(b.dataset.nth)));
      if(nths.length===0)return{dates:[startDateKey],info:{}};
      const endInput=document.getElementById('nth-end-date').value;
      const endDate=endInput?new Date(endInput+'T23:59:59'):new Date(startDate);if(!endInput)endDate.setFullYear(endDate.getFullYear()+1);
      info={type:'nth-weekday',dow,nths};
      let cur=new Date(startDate.getFullYear(),startDate.getMonth(),1);
      while(cur<=endDate){for(const nth of nths){const d=getNthWeekday(cur.getFullYear(),cur.getMonth(),dow,nth);if(d&&d>=startDate&&d<=endDate)dates.push(dateToKey(d));}cur.setMonth(cur.getMonth()+1);}
    } else if(type==='custom'){
      if(customDates.length>0)dates.push(...customDates);if(dates.length===0)dates.push(startDateKey);info={type:'custom'};
    }
    return{dates:[...new Set(dates)].sort(),info};
  }
  function getNthWeekday(year,month,dow,nth){const first=new Date(year,month,1);let fo=1+((dow-first.getDay()+7)%7);const t=fo+(nth-1)*7;if(t>new Date(year,month+1,0).getDate())return null;return new Date(year,month,t);}

  // ===== 削除確認 =====
  function showDeleteConfirm(eventId) {
    document.getElementById('confirm-title').textContent = '予定を削除';
